<script>
  // 強制キャッシュクリア（リダイレクトループ対策付き）
  (function() {
    const currentVersion = "v2.50";
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('v') !== currentVersion) {
      // リダイレクト回数をチェック（ループ防止）
      const redirectKey = '_v_redirect_count';
      const count = parseInt(sessionStorage.getItem(redirectKey) || '0');
      if (count >= 3) {
        // 3回以上リダイレクトしたらループとみなして停止
        sessionStorage.removeItem(redirectKey);
        return;
      }
      sessionStorage.setItem(redirectKey, String(count + 1));
      
      const shareParam = urlParams.get('share');
      let newUrl = "?v=" + currentVersion;
      if (shareParam) newUrl += "&share=" + encodeURIComponent(shareParam);
      window.location.replace(newUrl);
    } else {
      // バージョンが一致したらカウンタをリセット
      sessionStorage.removeItem('_v_redirect_count');
    }
  })();
</script>

<script>
  // Firebase初期化
  const firebaseConfig = {
    apiKey: "AIzaSyBcyqhr9RAJZgr7djOiABCgZBgPvKK7-3Y",
    authDomain: "majan-rule.firebaseapp.com",
    projectId: "majan-rule",
    storageBucket: "majan-rule.firebasestorage.app",
    messagingSenderId: "576775573389",
    appId: "1:576775573389:web:40c9a29a62372625ca37c4"
  };
  firebase.initializeApp(firebaseConfig);
  const fbAuth = firebase.auth();
  const fbDb = firebase.firestore();

  // =====================================================================
  // Firebase 同期ヘルパー
  // =====================================================================
  let _fbUid = null;
  let _fbSyncing = false;

  // プリセットIDを判定（プリセットはクラウド保存しない）
  function isPresetRule(rule) {
    return rule && (rule.readonly === true || (rule.id && rule.id.startsWith('preset_')));
  }

  // Firestoreにユーザールールを保存（ログイン済みユーザーのみ）
  async function syncRulesToCloud() {
    if (!_fbUid || _fbSyncing) return;
    // 未ログイン（匿名 or null）の場合はスキップ
    if (!fbAuth.currentUser || fbAuth.currentUser.isAnonymous) return;
    try {
      const userRules = (appData.rules || []).filter(r => !isPresetRule(r) && !r.id.startsWith('shared_'));
      const batch = fbDb.batch();
      const colRef = fbDb.collection('users').doc(_fbUid).collection('rules');
      
      // 現在のルールを書き込み
      for (const rule of userRules) {
        batch.set(colRef.doc(rule.id), {
          mode: rule.mode,
          name: rule.name,
          base_rule: rule.base_rule || '',
          date: rule.date || '',
          settings: JSON.stringify(rule.settings || {}),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      await batch.commit();
    } catch (e) {
      console.warn('Cloud sync failed:', e);
    }
  }

  // Firestoreからユーザールールを読み込み
  async function loadRulesFromCloud() {
    if (!_fbUid) return [];
    try {
      const snap = await fbDb.collection('users').doc(_fbUid).collection('rules').get();
      const cloudRules = [];
      snap.forEach(doc => {
        const d = doc.data();
        cloudRules.push({
          id: doc.id,
          mode: d.mode || '四麻',
          name: d.name || '',
          base_rule: d.base_rule || '',
          date: d.date || '',
          settings: typeof d.settings === 'string' ? JSON.parse(d.settings) : (d.settings || {})
        });
      });
      return cloudRules;
    } catch (e) {
      console.warn('Cloud load failed:', e);
      return [];
    }
  }

  // ローカルとクラウドのルールをマージ
  async function mergeCloudRules() {
    const cloudRules = await loadRulesFromCloud();
    if (cloudRules.length === 0) return;

    const localUserRules = appData.rules.filter(r => !isPresetRule(r) && !r.id.startsWith('shared_'));
    const localIds = new Set(localUserRules.map(r => r.id));

    // クラウドにあってローカルにないルールを追加
    for (const cr of cloudRules) {
      if (!localIds.has(cr.id)) {
        appData.rules.push(cr);
      }
    }
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
    if (typeof renderHome === 'function') renderHome();
  }

  // Firestoreから特定ルールを削除（ログイン済みユーザーのみ）
  async function deleteRuleFromCloud(ruleId) {
    if (!_fbUid) return;
    if (!fbAuth.currentUser || fbAuth.currentUser.isAnonymous) return;
    try {
      await fbDb.collection('users').doc(_fbUid).collection('rules').doc(ruleId).delete();
    } catch (e) {
      console.warn('Cloud delete failed:', e);
    }
  }

  // Googleログイン
  function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    fbAuth.signInWithPopup(provider).catch(e => {
      console.error('Google sign-in failed:', e);
      if (typeof showSnack === 'function') showSnack('ログインに失敗しました');
    });
  }

  // ログアウト
  function signOutFirebase() {
    fbAuth.signOut().then(() => {
      if (typeof showSnack === 'function') showSnack('ログアウトしました');
      if (typeof renderHome === 'function') renderHome();
    });
  }

  // 認証状態の監視
  fbAuth.onAuthStateChanged(async (user) => {
    if (user && !user.isAnonymous) {
      // Googleログイン済みユーザー
      _fbUid = user.uid;
      window._fbUser = user;
      // クラウドからルールをマージ
      if (typeof STORAGE_KEY !== 'undefined') {
        await mergeCloudRules();
      }
      if (typeof renderHome === 'function') renderHome();
    } else {
      // 未ログイン（匿名含む）→ ローカルのみ
      _fbUid = null;
      window._fbUser = null;
      if (typeof renderHome === 'function') renderHome();
    }
  });

  // Googleログイン（ボタンクリック直後に即ポップアップ）
  let _fbSigningIn = false;
  window._fbSigningIn = false;
  function linkToGoogle() {
    if (_fbSigningIn) return; // 二重タップ防止
    _fbSigningIn = true;
    window._fbSigningIn = true;
    if (typeof renderHome === 'function') renderHome(); // ローディング表示に即座更新
    const provider = new firebase.auth.GoogleAuthProvider();
    
    // ★ async処理なしで即座にポップアップを開く（iOS Safari対策）
    fbAuth.signInWithPopup(provider).then(async (result) => {
      _fbSigningIn = false;
      window._fbSigningIn = false;
      // ログイン成功 → ローカルのルールをクラウドにアップロード
      await mergeCloudRules();
      await syncRulesToCloud();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(err) {}
      if (typeof showSnack === 'function') showSnack('Googleアカウントでログインしました');
      if (typeof renderHome === 'function') renderHome();
    }).catch((e) => {
      _fbSigningIn = false;
      window._fbSigningIn = false;
      if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
        return; // ユーザーが閉じた
      }
      console.error('Google sign-in error:', e.code, e.message);
      if (typeof showSnack === 'function') showSnack('ログインに失敗しました: ' + (e.code || e.message));
    });
  }
</script>

    // Convert default standard rules to array mapping
    const migrateDef = (key, mapping, fallback) => {
        let def = localStorage.getItem(key);
        if (def && !def.startsWith('[')) {
            localStorage.setItem(key, JSON.stringify([mapping[def] || def]));
        } else if (!def) {

    }, 'preset_zoo_3');

  // プリセット同期: PRESET_INJECTIONSから毎回プリセットを最新に同期
  if (typeof PRESET_INJECTIONS !== 'undefined') {
    let presetsChanged = false;
    for (const pi of PRESET_INJECTIONS) {
      const existing = appData.rules.find(r => r.id === pi.id);
      if (existing) {
        existing.settings = {...pi.settings};
        existing.name = pi.name;
        existing.readonly = pi.readonly;
      } else {
        appData.rules.push({...pi});

      }
    }
    const validIds = new Set(PRESET_INJECTIONS.map(p => p.id));
    const before = appData.rules.length;
    appData.rules = appData.rules.filter(r => !r.id.startsWith('preset_') || validIds.has(r.id));
    if (appData.rules.length !== before) presetsChanged = true;

function saveData() {
  if (editingId) {
    const editingRule = getRule(editingId);
    if (editingRule && !editingRule.readonly) {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const h = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      editingRule.date = `${y}/${m}/${d} ${h}:${min}:${s}`;
    }
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
  // ログイン済みならクラウドにも同期（バックグラウンド）
  if (typeof syncRulesToCloud === 'function' && window._fbUser && !window._fbUser.isAnonymous) syncRulesToCloud();
}

function getBaseRuleName(k) {
  if (BASE_RULES_4[k]) return k;
  if (BASE_RULES_3[k]) return k;
  const r = appData.rules.find(rule => rule.id === k);
  if (r) return r.name;
  return k || ''; 
}
function getRule(id) { return appData.rules.find(r => r.id === id); }
function getOptions(mode) { return mode === '四麻' ? OPTIONS_4 : OPTIONS_3; }
function getCategories(mode) { return mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3; }
function getBaseRules(mode) {
  const base = mode === '四麻' ? {...BASE_RULES_4} : {...BASE_RULES_3};
  appData.rules.forEach(r => {
    if (r.mode === mode) {
      base[r.id] = r.settings;
    }
  });
  return base;
}
function getDefault(mode) { return mode === '四麻' ? {...DEFAULT_4} : {...DEFAULT_3}; }

  editingId = null;

  renderHome();
  showScreen('home');
}

function goHomeWithConfirm() {
  if (isViewMode) {
      // 表示画面からの「戻る」→ ホームへ
      goHome();
      return;
  }
  
  if (isSharedMode) {
      goHome();
      return;
  }
  
  // 編集画面からの「戻る」→ 表示画面へ
  const hasChanges = _editDirty;
  
  if (!hasChanges) {
      if (_isNewlyCreated && editingId) {
          appData.rules = appData.rules.filter(r => r.id !== editingId);
          saveData();
          goHome();
          return;
      }
      goViewMode();
      return;
  }
  
  if (confirm('保存せずに戻りますか？\n変更内容は破棄されます。')) {
    const ruleToRestore = getRule(editingId);
    if (ruleToRestore) {
      if (_editSnapshot) ruleToRestore.settings = JSON.parse(_editSnapshot);
      if (_editNameSnapshot !== null) ruleToRestore.name = _editNameSnapshot;
      // リバート時はdateを更新しない（editingIdを一時null化）
      const savedEditingId = editingId;
      editingId = null;
      saveData();
      editingId = savedEditingId;
    }
    if (_isNewlyCreated) {
      appData.rules = appData.rules.filter(r => r.id !== editingId);
      editingId = null;
      saveData();
      goHome();
    } else {
      goViewMode();
    }
  }
}

function saveAndGoHome() {
  _isNewlyCreated = false;
  saveData();
  goHome();
}

function saveAndGoView() {
  _isNewlyCreated = false;

  // スナップショットを更新
  const rule = getRule(editingId);
  if (rule) {
    _editSnapshot = JSON.stringify(rule.settings);
    _editNameSnapshot = rule.name;
  }
  goViewMode();
}

function shareRule(id) {
  const rule = getRule(id);
  if (!rule) return;
  
  const exportData = {
    m: rule.mode,
    n: rule.name,
    b: rule.base_rule,
    s: rule.settings
  };
  
  // IDを生成しURLを即座にクリップボードへ（ユーザー操作文脈を維持するため先にコピー）
  const shareId = generateShareId();
  const url = window.location.origin + window.location.pathname + '?share=' + shareId;
  
  navigator.clipboard.writeText(url).then(() => {
    showSnack('🔗 共有リンクをコピーしました');
  }).catch(() => {
    // clipboard APIが使えない場合の代替（iOS Safari等）
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showSnack('🔗 共有リンクをコピーしました');
  });
  
  // Firestoreに共有データをバックグラウンド保存
  fbDb.collection('shared_rules').doc(shareId).set({
    data: JSON.stringify(exportData),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => {
    console.error("shareRule Firestore Error:", e);
  });
}

// 短いランダムIDを生成（8文字、英数字）
function generateShareId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let id = '';
  for (let i = 0; i < 8; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
  return id;
}

async function checkSharedRule() {
  const urlParams = new URLSearchParams(window.location.search);
  const shareData = urlParams.get('share');
  if (!shareData) return false;
  
  try {
    let parsed = null;
    
    if (shareData.length <= 20) {
      // 短いID → Firestoreから取得
      const doc = await fbDb.collection('shared_rules').doc(shareData).get();
      if (!doc.exists) {
        alert('共有ルールが見つかりません。リンクが無効か期限切れです。');
        window.history.replaceState({}, document.title, window.location.pathname);
        return false;
      }
      parsed = JSON.parse(doc.data().data);
    } else {
      // レガシー: 長いLZString圧縮データ（後方互換性）
      let jsonStr = null;
      try {
        jsonStr = LZString.decompressFromEncodedURIComponent(shareData);
      } catch (err) { /* 無視 */ }
      if (!jsonStr) {
        let sanitizedBase64 = shareData.replace(/-/g, '+').replace(/_/g, '/').replace(/ /g, '+');
        while (sanitizedBase64.length % 4) sanitizedBase64 += '=';
        jsonStr = decodeURIComponent(atob(sanitizedBase64));
      }
      if (!jsonStr) throw new Error("Decompression produced empty string");
      parsed = JSON.parse(jsonStr);
    }
    
    const id = 'shared_' + Date.now();
    const now = new Date();
    const sharedDate = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const sharedRule = {
      id: id,
      mode: parsed.m || '四麻',
      name: parsed.n || '共有ルール',
      base_rule: parsed.b || '',
      date: sharedDate,
      settings: parsed.s || {},
      readonly: true
    };
    
    appData.rules.push(sharedRule); 
    window.history.replaceState({}, document.title, window.location.pathname);
    
    isSharedMode = true;
    isViewMode = true;
    editingId = id;
    
    renderEdit();
    showScreen('edit');
    return true;
  } catch (e) {
    console.error("checkSharedRule Error:", e);
    alert('共有ルールの読み込みに失敗しました。\n詳細: ' + e.message);
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  return false;
}

function createRule(mode) {
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  let activeDefaults = [];
  try {
     const raw = localStorage.getItem(mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma');
     if (raw) activeDefaults = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(activeDefaults)) activeDefaults = [];

  const candidates = appData.rules.filter(r => r.mode === mode && activeDefaults.includes(r.id));
  const parseDateStr = (str) => {
    if (!str) return 0;
    const t = Date.parse(str.replace(/\//g, '-'));
    return isNaN(t) ? 0 : t;
  };
  candidates.sort((a, b) => parseDateStr(b.date) - parseDateStr(a.date));

  const targetBase = candidates[0];
  let defBaseKey = null;
  let initSettings = getDefault(mode);

  if (targetBase) {
      defBaseKey = targetBase.id;
      initSettings = JSON.parse(JSON.stringify(targetBase.settings));
  } else {
      defBaseKey = mode === '四麻' ? 'preset_jantama_4' : 'preset_zoo_3';
  }

  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  const rule = {
    id, mode,
    name: '新規ルール',
    base_rule: '',
    date: `${y}/${m}/${d} ${h}:${min}:${s}`,
    settings: initSettings
  };
  appData.rules.push(rule);
  
  // 新規作成時は保存せずスナップショットだけ撮る
  _editSnapshot = JSON.stringify(rule.settings);
  _editNameSnapshot = rule.name;
  _editDirty = false;
  _isNewlyCreated = true;
  isSharedMode = false;
  isViewMode = false;
  editingId = id;
  goEdit();
}

function editRule(id) {
  const ruleForSnap = appData.rules.find(r => r.id === id);
  _editSnapshot = ruleForSnap ? JSON.stringify(ruleForSnap.settings) : null;
  _editNameSnapshot = ruleForSnap ? ruleForSnap.name : null;
  _editDirty = false;

  let activeDefaults = [];

     const raw = localStorage.getItem(rule.mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma');
     if (raw) activeDefaults = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(activeDefaults)) activeDefaults = [];

    if (!isReadonlyView || catMemo.trim() !== '') {

    }

    // 表示画面で全項目が非表示のカテゴリはスキップ
    if (isReadonlyView && catDivContent.length === 0) {
      continue;
    }

    // 通し番号を動的に付与（元の番号を除去してから再付番）
    catDisplayNum++;
    const catNameWithoutNum = catNameLong.replace(/^\d+\.\s*/, '');

  }

// --- スワイプ削除 ---
let _swipeStartX = 0, _swipeStartY = 0, _swipeCurrentX = 0, _activeSwipe = null;
let _swipeMoved = false;
const SWIPE_WIDTH = -120; 

function handleTouchStart(e) {
    _swipeStartX = e.touches[0].clientX;
    _swipeStartY = e.touches[0].clientY;
    _swipeCurrentX = _swipeStartX;
    _activeSwipe = e.currentTarget;
    _swipeMoved = false;
    document.querySelectorAll('.swipe-content').forEach(el => {
        if (el !== _activeSwipe) el.style.transform = 'translateX(0)';
    });
}

function handleTouchMove(e) {
    if (!_activeSwipe) return;
    _swipeCurrentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;
    const diffX = _swipeCurrentX - _swipeStartX;
    const diffY = currentY - _swipeStartY;
    
    // Y軸（縦）の動きがX軸より大きい場合はスワイプ判定をキャンセル
    if (!_swipeMoved) {
        if (Math.abs(diffX) > 10 && Math.abs(diffX) > Math.abs(diffY)) {
            _swipeMoved = true;
        } else if (Math.abs(diffY) > 10) {
            _activeSwipe = null; 
            return;
        } else {
            return; // 遊び（10px以内）のフリックは無視
        }
    }
    
    if (_swipeMoved && diffX < 0 && diffX > SWIPE_WIDTH - 20) {
        // デフォルトのスクロール挙動を止める
        if (e.cancelable) e.preventDefault();
        _activeSwipe.style.transform = `translateX(${diffX}px)`;
    }
}

function handleTouchEnd(e) {
    if (!_activeSwipe) return;
    const diffX = _swipeCurrentX - _swipeStartX;
    if (_swipeMoved && diffX < SWIPE_WIDTH / 2) {
        _activeSwipe.style.transform = `translateX(${SWIPE_WIDTH}px)`;
    } else {
        _activeSwipe.style.transform = 'translateX(0)';
    }
    _activeSwipe = null;
    _swipeMoved = false;
}

function showEditOptionsDialog(key) {

  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const defaultOpts = opts[key] || [];

  // モーダル要素を作成

  overlay.id = 'edit-options-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';

    </div>`;
  }

  // ユーザー追加選択肢（編集・削除可能）
  for (let i = 0; i < userOpts.length; i++) {
    html += `<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;gap:8px;">
      <input type="text" value="${esc(userOpts[i])}" data-user-opt-idx="${i}" style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;">

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

window.toggleDefaultBaseRule = function(mode, id) {
  const key = mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma';
  let arr = [];
  try {
     const raw = localStorage.getItem(key);
     if (raw) arr = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(arr)) arr = [];
  
  if (arr.includes(id)) {
      arr = arr.filter(x => x !== id);
  } else {
      arr.push(id);
  }
  localStorage.setItem(key, JSON.stringify(arr));
  
  if (window.triggerReactRefresh) window.triggerReactRefresh();
  else if (typeof window.renderHome === 'function') window.renderHome();
};

                <div 
                  key={rule.id} 
                  className={isReadOnly ? "bg-theme-readonlyBg p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border opacity-90 cursor-pointer active:opacity-60 transition-opacity" : "bg-theme-surface p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border/50 cursor-pointer active:opacity-60 transition-opacity"}
                  onClick={() => window.editRule(rule.id)}
                >
                  <div 
                    className="flex-1 min-w-0 pr-4 flex flex-col pointer-events-none"
                  >
                    {!isReadOnly ? (
                      <>
                        <h2 className="text-base font-semibold text-theme-text truncate">
                          {rule.name}{isDef ? <span className="text-theme-primary ml-1 text-sm">(標準ルール)</span> : ""}
                        </h2>
                        <div className="flex items-center gap-1 mt-1 text-theme-textMuted">
                          <span className="material-symbols-outlined text-[14px]">calendar_today</span>
                          <p className="text-xs">更新: {rule.date || "2026/03/16"}</p>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex items-center gap-2">
                            <h2 className="text-base font-semibold text-theme-text truncate">
                              {rule.name}{isDef ? <span className="text-theme-primary ml-1 text-sm">(標準ルール)</span> : ""}
                            </h2>
                            <span className="material-symbols-outlined text-theme-textMuted text-[18px]">lock</span>
                          </div>
                          <div className="flex items-center gap-1 text-theme-textMuted">
                            <span className="material-symbols-outlined text-[14px]">verified</span>
                            <p className="text-xs">編集不可</p>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                  <div className="flex items-center gap-4 text-theme-textMuted z-10">
                    <button 
                      onClick={(e) => { e.stopPropagation(); window.toggleDefaultBaseRule(rule.mode, rule.id); }}
                      className={`flex items-center justify-center ${isDef ? 'text-theme-primary' : 'text-theme-textMuted active:scale-90 transition-all font-inherit'}`}
                      aria-label="標準設定"
                    >
                      <span className="material-symbols-outlined text-[24px]">{isDef ? 'star' : 'star_border'}</span>
                    </button>
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('copy', rule); }}
                      className="flex items-center justify-center hover:text-theme-primary active:scale-90 transition-all font-inherit"
                      aria-label="コピー"
                    >
                      <span className="material-symbols-outlined text-[20px]">content_copy</span>
                    </button>
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('delete', rule); }}
                      className="flex items-center justify-center hover:text-theme-danger active:scale-90 transition-all font-inherit"
                      aria-label="削除"
                    >
                      <span className="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                  </div>
                </div>
              );
            })}

            {displayedRules.length === 0 && (
              <div className="text-center py-10 text-theme-textMuted">
                <p className="text-sm font-medium">{CONFIG.strings.emptyRules}</p>
              </div>
            )}
          </div>
        </main>

        <footer className="py-6 text-center shrink-0" style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }}>
          {/* Firebase認証UI */}
          {(() => {
            const user = window._fbUser;
            if (user && !user.isAnonymous) {
              return (
                <div style={{
                  background: 'var(--color-surface, #fff)',
                  border: '1px solid var(--color-border, #e5e5ea)',
                  borderRadius: '12px', padding: '12px 16px', marginBottom: '12px',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span style={{ fontSize: '16px' }}>☁️</span>
                    <div style={{ textAlign: 'left' }}>
                      <div style={{ fontSize: '11px', fontWeight: '600', color: 'var(--color-text, #1c1c1e)' }}>クラウド同期ON</div>
                      <div style={{ fontSize: '10px', color: 'var(--color-textMuted, #8e8e93)' }}>{user.email}</div>
                    </div>
                  </div>
                  <button onClick={() => window.signOutFirebase && window.signOutFirebase()} style={{
                    fontSize: '11px', color: 'var(--color-textMuted, #8e8e93)',
                    background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline',
                  }}>ログアウト</button>
                </div>
              );
            } else {
              return (
                <button onClick={() => window.linkToGoogle && window.linkToGoogle()} 
                disabled={window._fbSigningIn}
                style={{
                  width: '100%', padding: '12px', marginBottom: '12px',
                  background: window._fbSigningIn ? '#f5f5f5' : '#fff', 
                  border: '1px solid #dadce0', borderRadius: '12px',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
                  cursor: window._fbSigningIn ? 'default' : 'pointer', 
                  fontSize: '13px', fontWeight: '600', 
                  color: window._fbSigningIn ? '#999' : '#3c4043',
                  transition: 'all 0.2s',
                  opacity: window._fbSigningIn ? 0.7 : 1,
                }}>
                  {window._fbSigningIn ? (
                    <>
                      <span style={{ display: 'inline-block', width: '18px', height: '18px', border: '2px solid #dadce0', borderTopColor: '#4285F4', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></span>
                      ログイン中...
                    </>
                  ) : (
                    <>
                      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                      Googleでログイン（データをクラウド保存）
                    </>
                  )}
                </button>
              );
            }
          })()}
          <p className="text-[11px] font-medium text-theme-textMuted tracking-wider mb-1">
            {CONFIG.appVersion}
          </p>
          <p className="text-[10px] text-theme-textMuted/70">
            ビルド時刻: {CONFIG.buildDate}
          </p>
        </footer>

      </div>
    );
  }

  // Vanilla JSからのレンダリングフック
  window._renderReactHome = function() {
    if (!window.reactRoot) {
      window.reactRoot = ReactDOM.createRoot(document.getElementById('react-home-root'));
    }
    // VanillaJSの現在のステートを伝播させて再描画
    window.reactRoot.render(<App rulesFromVanilla={appData.rules} />);
  }
</script>
</body>
</html>
