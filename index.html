<style>
  :root {
    --color-bg: #F5F5F7;
    --color-surface: #FFFFFF;
    --color-primary: #007AFF;
    --color-text: #1C1C1E;
    --color-text-muted: #8E8E93;
    --color-border: #E5E5EA;
    --color-danger: #FF3B30;
    --color-highlight-bg: #EAF4FF;
    --color-segmented-bg: #E3E3E8;
    --color-readonly-bg: #F9F9FA;
    
    --app-max-width: 100%;
    --app-padding: 5vw;
  }
  
  body {
    background-color: var(--color-bg);
    color: var(--color-text);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent; 
    overflow-x: hidden;
  }

  .swipe-item {
      position: relative;
      overflow: hidden;
  }
  
  .swipe-content {
      position: relative;
      z-index: 10;
      background-color: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
  }
  
  .swipe-item:last-child .swipe-content { 
      border-bottom: none; 
  }
  
  .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      display: flex;
      z-index: 5;
  }

  .is-changed .swipe-content {
      background-color: var(--color-highlight-bg);
  }
  .is-changed .item-label { color: var(--color-primary); font-weight: 600; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    flex-shrink: 0;
  }

  .app-container {
    width: var(--app-max-width);
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* React用のスクロールバー非表示とアニメーションはここに隔離 */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideUp {
    from { transform: translate(-50%, 100%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }
  .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  
  #screen-home * {
      box-sizing: border-box;
  }
</style>
</head>
<body>
<div class="app" id="app" style="background-color: transparent;"> <!-- style.cssの背景を上書きさせない -->
  <!-- ホーム画面 (React化) -->
  <div class="screen active" style="padding:0; background-color: var(--color-bg);" id="screen-home">
    <div id="react-home-root" style="flex:1; display:flex; flex-direction:column; height: 100%;"></div>
  </div>
  <!-- 編集画面 -->
  <div class="screen bg-theme-bg" id="screen-edit">
    <nav class="shrink-0 pt-12 pb-3 px-4 flex items-center justify-between bg-theme-bg/90 backdrop-blur-md sticky top-0 z-40 border-b border-theme-border/50 relative">
        <button class="flex items-center text-theme-primary font-medium active:opacity-50 transition-opacity z-10 w-[70px]" onclick="goHomeWithConfirm()">
            <span class="material-symbols-outlined text-[24px] -ml-2">chevron_left</span>戻る
        </button>
        <div class="font-bold text-[17px] text-theme-text absolute left-0 right-0 text-center pointer-events-none" id="edit-mode-label"></div>
        <div class="z-10 w-[70px]"></div>
    </nav>

    <main class="flex-1 overflow-y-auto pb-32 w-full">
        <div class="px-4 pt-6 pb-2 w-full">
            <input type="text" id="edit-name" placeholder="ルール名を入力" class="w-full text-2xl font-bold bg-transparent border-none outline-none placeholder-theme-textMuted mb-5" oninput="onNameChange(this.value)">
            
            <div id="base-rule-section" class="bg-theme-surface rounded-xl p-4 flex items-center justify-between shadow-sm border border-theme-border/30 hidden">
                <span class="font-medium text-sm whitespace-nowrap mr-4 shrink-0">標準ルール</span>
                
                <div class="relative flex-1 flex justify-end items-center min-w-0">
                    <span id="standard-rule-display" class="text-theme-textMuted text-sm font-medium pr-6 text-right truncate w-full pointer-events-none block"></span>
                    <span class="material-symbols-outlined absolute right-0 text-theme-textMuted text-[18px] pointer-events-none">unfold_more</span>
                    <select id="base-rule-select" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="onBaseRuleChange(this.value)"></select>
                </div>
            </div>
            
            <div class="mt-3 flex items-start gap-1.5 text-[11px] text-theme-textMuted px-1">
                <span class="material-symbols-outlined text-[14px] text-theme-primary">info</span>
                <p>標準ルールと異なっている項目は、<span class="text-theme-primary font-semibold">青色でハイライト</span>されます。</p>
            </div>
        </div>

        <div id="edit-fields" class="px-4 flex flex-col gap-6 mt-2 w-full"></div>
    </main>

    <div class="fixed bottom-0 w-full max-w-[40rem] bg-theme-bg/95 backdrop-blur-md border-t border-theme-border/50 p-4 pb-8 z-40 flex gap-3">
        <button class="flex-1 bg-theme-surface text-theme-text border border-theme-border py-3 rounded-xl font-semibold shadow-sm active:bg-gray-50 flex justify-center items-center gap-1 transition-all" onclick="saveAndGoHome()" id="btn-save-bottom">
            <span class="material-symbols-outlined text-[20px]">save</span> 保存
        </button>
        <button class="flex-1 bg-theme-primary text-white py-3 rounded-xl font-semibold shadow-sm active:scale-95 flex justify-center items-center gap-1 transition-all" onclick="openActionSheet()" id="btn-share-options">
            <span class="material-symbols-outlined text-[20px]">ios_share</span> 共有・出力
        </button>
    </div>

    <!-- Action Sheet Overlay -->
    <div id="action-sheet-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden transition-opacity duration-300 opacity-0" onclick="closeActionSheet()"></div>
    
    <!-- Action Sheet -->
    <div id="action-sheet" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[40rem] z-[70] transition-transform duration-300 translate-y-full px-3 pb-8 pt-2">
        <div class="bg-white/95 backdrop-blur-xl rounded-2xl overflow-hidden mb-2">
            <button class="w-full py-4 text-theme-primary text-[17px] border-b border-theme-border/50 active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => { if(!isSharedMode) saveData(); shareRule(editingId); }, 300)">
                <span class="material-symbols-outlined text-[20px]">link</span>共有URLを発行
            </button>
            <button class="w-full py-4 text-theme-primary text-[17px] border-b border-theme-border/50 active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => { if(!isSharedMode) saveData(); exportPDF(); }, 300)">
                <span class="material-symbols-outlined text-[20px]">picture_as_pdf</span>PDFとして出力
            </button>
            <button class="w-full py-4 text-theme-primary text-[17px] active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => { if(!isSharedMode) saveData(); exportImage(); }, 300)">
                <span class="material-symbols-outlined text-[20px]">image</span>画像として保存
            </button>
        </div>
        <div class="bg-white rounded-2xl overflow-hidden">
            <button class="w-full py-4 text-theme-danger text-[17px] font-semibold active:bg-gray-200" onclick="closeActionSheet()">
                キャンセル
            </button>
        </div>
    </div>
  </div>



<!-- 削除確認 -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal-box">
    <p>このルールを削除しますか？</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-red" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

                chombo_taiou: "やり直し",
                pen_goron_taopai: "チョンボ", pen_noten_reach: "チョンボ", pen_reach_bad_ankan: "チョンボ",
                pen_goron_no_taopai: "上がり放棄", pen_gonaki_sarashi: "上がり放棄", pen_kuikae_ihan: "上がり放棄",
                pen_tahai: "上がり放棄"
            });
        }
    }
    saveData();
  }

  if (!appData.presetsMigrated_v13) {
    appData.presetsMigrated_v13 = true;
    for (const rule of appData.rules) {
      if ('pen_reach_torikeshi' in rule.settings) {
         delete rule.settings['pen_reach_torikeshi'];
      }
      if (!('keibappu_taiou' in rule.settings)) {
         rule.settings.keibappu_taiou = "なし";
      }
    }
    saveData();
  }

  if (!appData.presetsMigrated_v14) {
    appData.presetsMigrated_v14 = true;
    for (const rule of appData.rules) {
        if (rule.id === 'preset_zoo_3') {
            Object.assign(rule.settings, {
                uma: "+20/±0/-20",
                tochu_kyushu: "なし",
                tochu_sukan: "なし",
                tochu_honba: "途中流局なし",
                furiten_open_reach: "なし",
                reach_ankan_okuri: "不可",
                reach_ankan_mentsu: "可",
                sp_renho: "あり"
            });
        }
    }
    saveData();
  }

  // v15: PRESET_INJECTIONSから全プリセットを再構築（TSV列追加で自動反映）
  if (!appData.presetsMigrated_v15) {
    appData.presetsMigrated_v15 = true;
    if (typeof PRESET_INJECTIONS !== 'undefined') {
      for (const pi of PRESET_INJECTIONS) {
        const existing = appData.rules.find(r => r.id === pi.id);
        if (existing) {
          existing.settings = {...pi.settings};
          existing.name = pi.name;
          existing.readonly = true;
        } else {
          appData.rules.push({...pi});
        }
      }
      const validIds = new Set(PRESET_INJECTIONS.map(p => p.id));
      appData.rules = appData.rules.filter(r => !r.id.startsWith('preset_') || validIds.has(r.id));
      // デフォルト標準ルールを設定
      if (typeof DEFAULT_PRESET_IDS_4 !== 'undefined') {
        localStorage.setItem('mahjong_default_base_4ma', JSON.stringify(DEFAULT_PRESET_IDS_4));
      }
      if (typeof DEFAULT_PRESET_IDS_3 !== 'undefined') {
        localStorage.setItem('mahjong_default_base_3ma', JSON.stringify(DEFAULT_PRESET_IDS_3));
      }
    }
    saveData();
  }


  // マイグレーション: 古いデータに不足しているキーをデフォルト値で補完
  let migrated = false;
  for (const rule of appData.rules) {
    const def = getDefault(rule.mode);
    const cats = getCategories(rule.mode);
    for (const [, keys] of cats) {
      for (const k of keys) {
        if (!(k in rule.settings)) {
          rule.settings[k] = def[k] ?? '';
          migrated = true;
        }
      }
    }
  }
  if (migrated) saveData();
}

      const now = new Date();

      const s = String(now.getSeconds()).padStart(2, '0');

function shareRule(id) {
  const rule = getRule(id);
  if (!rule) return;
  
  // 不要な肥大化データの除外 (例: custom_tiles が空なら除外)
  const exportData = {
    m: rule.mode,
    n: rule.name,
    b: rule.base_rule,
    s: rule.settings
  };
  
  try {
    const jsonStr = JSON.stringify(exportData);
    // LZStringによって安全なURL用文字列に圧縮＆エンコード
    const compressedStr = LZString.compressToEncodedURIComponent(jsonStr);
    
    const url = new URL(window.location.href);
    url.searchParams.set('share', compressedStr);
    
    navigator.clipboard.writeText(url.href).then(() => {
      showSnack('🔗 共有リンクをコピーしました');
    }).catch(() => {
      alert('リンクのコピーに失敗しました。以下のURLをコピーしてください：\n\n' + url.href);
    });
  } catch (e) {
    console.error("shareRule Error:", e);
    alert('共有リンクの生成に失敗しました: ' + e.message);
  }
}

function checkSharedRule() {
  const urlParams = new URLSearchParams(window.location.search);
  const shareData = urlParams.get('share');
  if (shareData) {
    try {
      // ① 最新の LZString でデコード＆展開を試行
      let jsonStr = null;
      try {
        jsonStr = LZString.decompressFromEncodedURIComponent(shareData);
      } catch (err) { /* 無視して次へ */ }

      // ② レガシー仕様（v4.8以下）の Base64URL 形式だった場合のフォールバック
      if (!jsonStr) {
        let sanitizedBase64 = shareData.replace(/-/g, '+').replace(/_/g, '/').replace(/ /g, '+');
        while (sanitizedBase64.length % 4) sanitizedBase64 += '=';
        jsonStr = decodeURIComponent(atob(sanitizedBase64));
      }

      if (!jsonStr) {
        alert("エラー: 共有データの展開に失敗しました（空のデータ）");
        throw new Error("Decompression produced empty string");
      }
      const parsed = JSON.parse(jsonStr);
      
      const id = 'shared_' + Date.now();
      const sharedRule = {
        id: id,
        mode: parsed.m || '四麻',
        name: parsed.n || '共有ルール',
        base_rule: parsed.b || '',
        settings: parsed.s || {},
        readonly: true
      };
      
      // 既存のリストには入れず一時データとして扱う
      appData.rules.push(sharedRule); 
      // URLからパラメータを消去
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
      
      isSharedMode = true;
      editingId = id;
      
      renderEdit();
      showScreen('edit');
      return true;
    } catch (e) {
      console.error("checkSharedRule Error:", e);
      alert('共有ルールの読み込みに失敗しました。\n詳細な原因: ' + e.message + '\n\n共有データ:\n' + shareData.substring(0, 50) + '...');
      const fallbackUrl = window.location.pathname;
      window.history.replaceState({}, document.title, fallbackUrl);
    }
  }
  return false;
}

function createRule(mode) {
  _editSnapshot = JSON.stringify(appData);
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  let activeDefaults = [];
  try {
     const raw = localStorage.getItem(mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma');
     if (raw) activeDefaults = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(activeDefaults)) activeDefaults = [];

  const candidates = appData.rules.filter(r => r.mode === mode && activeDefaults.includes(r.id));
  const parseDateStr = (str) => {
    if (!str) return 0;
    const t = Date.parse(str.replace(/\//g, '-'));
    return isNaN(t) ? 0 : t;
  };
  candidates.sort((a, b) => parseDateStr(b.date) - parseDateStr(a.date));

  const targetBase = candidates[0];
  let defBaseKey = null;
  let initSettings = getDefault(mode);

  if (targetBase) {
      defBaseKey = targetBase.id;
      initSettings = JSON.parse(JSON.stringify(targetBase.settings));
  } else {
      defBaseKey = mode === '四麻' ? 'preset_jantama_4' : 'preset_zoo_3';
  }

  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  const rule = {
    id, mode,
    name: '新規ルール',
    base_rule: defBaseKey,
    date: `${y}/${m}/${d} ${h}:${min}:${s}`,
    settings: initSettings
  };
  appData.rules.push(rule);
  
  // 新規作成時は保存せずスナップショットだけ撮る
  _editSnapshot = JSON.stringify(appData);
  _isNewlyCreated = true;
  isSharedMode = false;
  editingId = id;
  goEdit();
}

function editRule(id) {
  _editSnapshot = JSON.stringify(appData);
  const rule = getRule(id);
  // コピー等で保存された readonly ルールの場合は isSharedMode 相当の閲覧専用として扱う
  isSharedMode = rule && rule.readonly === true;
  
  let activeDefaults = [];
  try {
     const raw = localStorage.getItem(rule.mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma');
     if (raw) activeDefaults = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(activeDefaults)) activeDefaults = [];
  
  // 標準ルールの場合は、開いた時に自身を比較対象の初期値にする
  if (activeDefaults.includes(id)) {
      rule.base_rule = id;
  }
  
  editingId = id;
  goEdit();
}

// --- スワイプ削除 ---
let _swipeStartX = 0, _swipeStartY = 0, _swipeCurrentX = 0, _activeSwipe = null;
let _swipeMoved = false;
const SWIPE_WIDTH = -120; 

function handleTouchStart(e) {
    _swipeStartX = e.touches[0].clientX;
    _swipeStartY = e.touches[0].clientY;
    _swipeCurrentX = _swipeStartX;
    _activeSwipe = e.currentTarget;
    _swipeMoved = false;
    document.querySelectorAll('.swipe-content').forEach(el => {
        if (el !== _activeSwipe) el.style.transform = 'translateX(0)';
    });
}

function handleTouchMove(e) {
    if (!_activeSwipe) return;
    _swipeCurrentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;
    const diffX = _swipeCurrentX - _swipeStartX;
    const diffY = currentY - _swipeStartY;
    
    // Y軸（縦）の動きがX軸より大きい場合はスワイプ判定をキャンセル
    if (!_swipeMoved) {
        if (Math.abs(diffX) > 10 && Math.abs(diffX) > Math.abs(diffY)) {
            _swipeMoved = true;
        } else if (Math.abs(diffY) > 10) {
            _activeSwipe = null; 
            return;
        } else {
            return; // 遊び（10px以内）のフリックは無視
        }
    }
    
    if (_swipeMoved && diffX < 0 && diffX > SWIPE_WIDTH - 20) {
        // デフォルトのスクロール挙動を止める
        if (e.cancelable) e.preventDefault();
        _activeSwipe.style.transform = `translateX(${diffX}px)`;
    }
}

function handleTouchEnd(e) {
    if (!_activeSwipe) return;
    const diffX = _swipeCurrentX - _swipeStartX;
    if (_swipeMoved && diffX < SWIPE_WIDTH / 2) {
        _activeSwipe.style.transform = `translateX(${SWIPE_WIDTH}px)`;
    } else {
        _activeSwipe.style.transform = 'translateX(0)';
    }
    _activeSwipe = null;
    _swipeMoved = false;
}

  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const defaultOpts = opts[key] || [];
  const userOpts = rule.settings['user_options_' + key] || [];

  // モーダル要素を作成

  overlay.id = 'edit-options-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';

  // ユーザー追加選択肢（編集・削除可能）
  for (let i = 0; i < userOpts.length; i++) {
    html += `<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;gap:8px;">
      <input type="text" value="${esc(userOpts[i])}" data-user-opt-idx="${i}" style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;">

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

    window._triggerReactPWABanner();
  }

function installPWA() {

          if (newSW.state === 'activated') {

  const key = mode === '四麻' ? 'mahjong_default_base_4ma' : 'mahjong_default_base_3ma';
  let arr = [];
  try {
     const raw = localStorage.getItem(key);
     if (raw) arr = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(arr)) arr = [];
  
  if (arr.includes(id)) {
      arr = arr.filter(x => x !== id);
  } else {
      arr.push(id);
  }
  localStorage.setItem(key, JSON.stringify(arr));
  
  if (window.triggerReactRefresh) window.triggerReactRefresh();
  else if (typeof window.renderHome === 'function') window.renderHome();
};

            <button 
              onClick={() => setActiveTab(4)}
              className={`flex-1 py-1.5 text-sm transition-all rounded ${activeTab === 4 ? 'font-semibold text-center bg-theme-surface shadow-sm text-theme-text' : 'font-medium text-center text-theme-textMuted active:bg-white/50'}`}
            >
              {CONFIG.strings.tab4p}
            </button>
            <button 
              onClick={() => setActiveTab(3)}
              className={`flex-1 py-1.5 text-sm transition-all rounded ${activeTab === 3 ? 'font-semibold text-center bg-theme-surface shadow-sm text-theme-text' : 'font-medium text-center text-theme-textMuted active:bg-white/50'}`}
            >
              {CONFIG.strings.tab3p}
            </button>
          </div>
        </div>

        {/* PWAインストールバナー */}
        {showPwaBanner && (
          <div style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }} className="mb-4">
            <div onClick={handleInstallPWA} className="bg-theme-surface text-theme-primary text-xs font-bold px-4 py-3 rounded-xl border border-theme-border flex items-center justify-between cursor-pointer active:scale-95 transition-transform shadow-sm">
              <span>📱 ホーム画面に追加してアプリとして使う</span>
              <button className="bg-theme-primary text-white px-3 py-1.5 rounded-md shadow-sm">追加</button>
            </div>
          </div>
        )}

        {/* 新規作成ボタン */}
        <div style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }} className="mb-6">
          <button 
            onClick={() => window.createRule(activeTab === 4 ? '四麻' : '三麻')}
            className="w-full bg-theme-primary text-white rounded-xl py-3.5 flex items-center justify-center gap-2 font-semibold shadow-sm active:scale-95 transition-transform"
          >
            <span className="material-symbols-outlined text-[22px]">add_circle</span>
            {activeTab === 4 ? CONFIG.strings.create4pRule : CONFIG.strings.create3pRule}
          </button>
        </div>

        {/* スクロール可能なメインコンテンツ（ルール一覧） */}
        <main className="flex-1 overflow-y-auto pb-8 no-scrollbar" style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }}>
          <div className="flex flex-col gap-3">
            {displayedRules.map((rule) => {
              const isReadOnly = rule.readonly;
              let def4 = []; let def3 = [];
              try { def4 = JSON.parse(localStorage.getItem('mahjong_default_base_4ma') || '[]'); } catch(e){}
              try { def3 = JSON.parse(localStorage.getItem('mahjong_default_base_3ma') || '[]'); } catch(e){}
              if (!Array.isArray(def4)) def4 = [];
              if (!Array.isArray(def3)) def3 = [];
              
              const isDef = (rule.mode === '四麻' && def4.includes(rule.id)) || (rule.mode === '三麻' && def3.includes(rule.id));

              return (
                <div 
                  key={rule.id} 
                  className={isReadOnly ? "bg-theme-readonlyBg p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border opacity-90 cursor-pointer active:opacity-60 transition-opacity" : "bg-theme-surface p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border/50 cursor-pointer active:opacity-60 transition-opacity"}
                  onClick={() => window.editRule(rule.id)}
                >
                  <div 
                    className="flex-1 min-w-0 pr-4 flex flex-col pointer-events-none"
                  >
                    {!isReadOnly ? (
                      <>
                        <h2 className="text-base font-semibold text-theme-text truncate">
                          {rule.name}{isDef ? <span className="text-theme-primary ml-1 text-sm">(標準ルール)</span> : ""}
                        </h2>
                        <div className="flex items-center gap-1 mt-1 text-theme-textMuted">
                          <span className="material-symbols-outlined text-[14px]">calendar_today</span>
                          <p className="text-xs">更新: {rule.date || "2026/03/16"}</p>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex items-center gap-2">
                            <h2 className="text-base font-semibold text-theme-text truncate">
                              {rule.name}{isDef ? <span className="text-theme-primary ml-1 text-sm">(標準ルール)</span> : ""}
                            </h2>
                            <span className="material-symbols-outlined text-theme-textMuted text-[18px]">lock</span>
                          </div>
                          <div className="flex items-center gap-1 text-theme-textMuted">
                            <span className="material-symbols-outlined text-[14px]">verified</span>
                            <p className="text-xs">編集不可</p>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                  <div className="flex items-center gap-4 text-theme-textMuted z-10">
                    <button 
                      onClick={(e) => { e.stopPropagation(); window.toggleDefaultBaseRule(rule.mode, rule.id); }}
                      className={`flex items-center justify-center ${isDef ? 'text-theme-primary' : 'text-theme-textMuted active:scale-90 transition-all font-inherit'}`}
                      aria-label="標準設定"
                    >
                      <span className="material-symbols-outlined text-[24px]">{isDef ? 'star' : 'star_border'}</span>
                    </button>
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('copy', rule); }}
                      className="flex items-center justify-center hover:text-theme-primary active:scale-90 transition-all font-inherit"
                      aria-label="コピー"
                    >
                      <span className="material-symbols-outlined text-[20px]">content_copy</span>
                    </button>
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('delete', rule); }}
                      className="flex items-center justify-center hover:text-theme-danger active:scale-90 transition-all font-inherit"
                      aria-label="削除"
                    >
                      <span className="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                  </div>
                </div>
              );
            })}

            {displayedRules.length === 0 && (
              <div className="text-center py-10 text-theme-textMuted">
                <p className="text-sm font-medium">{CONFIG.strings.emptyRules}</p>
              </div>
            )}
          </div>
        </main>

        <footer className="py-6 text-center shrink-0">
          <p className="text-[11px] font-medium text-theme-textMuted tracking-wider mb-1">
            {CONFIG.appVersion}
          </p>
          <p className="text-[10px] text-theme-textMuted/70">
            ビルド時刻: {CONFIG.buildDate}
          </p>
        </footer>

      </div>
    );
  }

  // Vanilla JSからのレンダリングフック
  window._renderReactHome = function() {
    if (!window.reactRoot) {
      window.reactRoot = ReactDOM.createRoot(document.getElementById('react-home-root'));
    }
    // VanillaJSの現在のステートを伝播させて再描画
    window.reactRoot.render(<App rulesFromVanilla={appData.rules} />);
  }
</script>
</body>
</html>
