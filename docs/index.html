<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="麻雀のルールを簡単に作成・共有できるWebアプリ。三人麻雀・四人麻雀対応。">
<meta name="theme-color" content="#F0F2F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>麻雀ルール共有アプリ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">
  <!-- ホーム画面 -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <span class="header-title">🀄 麻雀ルール共有</span>
      <span style="font-size:0.65rem;color:var(--text-sub);text-align:right;line-height:1.3">v1.6<br>2026-03-15 22:06</span>
    </div>
    <div class="home-hero">
      <h1>麻雀ルールブック</h1>
      <p>ルールを作成して仲間と共有しよう</p>
    </div>
    <div class="create-btns">
      <button class="btn btn-primary" onclick="createRule('四麻')">➕ 四麻作成</button>
      <button class="btn btn-purple" onclick="createRule('三麻')">➕ 三麻作成</button>
    </div>
    <div id="install-banner" class="install-banner" onclick="installPWA()">
      <p>📱 ホーム画面に追加してアプリとして使えます</p>
      <button class="btn btn-sm">追加</button>
    </div>
    <div class="rule-list" id="rule-list"></div>
  </div>

  <!-- 編集画面 -->
  <div class="screen" id="screen-edit">
    <div class="header">
      <button class="header-back" onclick="goHome()">← 戻る</button>
      <span class="header-title" id="edit-mode-label"></span>
      <button class="btn btn-sm btn-green" onclick="goPreview()">プレビュー</button>
    </div>
    <div class="name-input-wrap">
      <label>ルール名</label>
      <input type="text" class="name-input" id="edit-name" placeholder="ルール名を入力" oninput="onNameChange(this.value)">
    </div>
    <div id="base-rule-section" class="base-rule-wrap hidden">
      <label>比較基準（ベースルール）</label>

      <select id="base-rule-select" onchange="onBaseRuleChange(this.value)"></select>
    </div>
    <div class="edit-scroll" id="edit-fields"></div>
  </div>

  <!-- プレビュー画面 -->
  <div class="screen" id="screen-preview">
    <div class="header">
      <button class="header-back" onclick="goEdit()">← 編集に戻る</button>
      <span class="header-title">出力プレビュー</span>
      <div style="width:50px"></div>
    </div>
    <div class="preview-content">
      <div id="preview-area"></div>
    </div>
    <div class="export-btns">
      <div class="btn-row">
        <button class="btn btn-green" onclick="exportImage()">📷 画像を保存</button>
        <button class="btn btn-orange" onclick="exportPDF()">📄 PDFを保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal-box">
    <p>このルールを削除しますか？</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-red" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<!-- スナックバー -->
<div class="snackbar" id="snackbar"></div>

<!-- 外部ライブラリ -->

// =====================================================================
// アプリ状態管理
// =====================================================================
const STORAGE_KEY = 'mahjong_rules_pwa_v1';
let appData = { rules: [] };
let editingId = null;
let deleteTargetId = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = JSON.parse(raw);
  } catch(e) { appData = { rules: [] }; }
  // マイグレーション: 古いデータに不足しているキーをデフォルト値で補完
  let migrated = false;
  for (const rule of appData.rules) {
    const def = getDefault(rule.mode);
    const cats = getCategories(rule.mode);
    for (const [, keys] of cats) {
      for (const k of keys) {
        if (!(k in rule.settings)) {
          rule.settings[k] = def[k] ?? '';
          migrated = true;
        }
      }
    }
  }
  if (migrated) saveData();
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

function getRule(id) { return appData.rules.find(r => r.id === id); }
function getOptions(mode) { return mode === '四麻' ? OPTIONS_4 : OPTIONS_3; }
function getCategories(mode) { return mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3; }
function getBaseRules(mode) { return mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3; }
function getDefault(mode) { return mode === '四麻' ? {...DEFAULT_4} : {...DEFAULT_3}; }

// =====================================================================
// 画面遷移
// =====================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  editingId = null;
  renderHome();
  showScreen('home');
}

function goEdit() {
  renderEdit();
  showScreen('edit');
}

function goPreview() {
  saveData();
  renderPreview();
  showScreen('preview');
}

// =====================================================================
// ホーム画面
// =====================================================================
function renderHome() {
  const list = document.getElementById('rule-list');
  if (appData.rules.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">🀄</div><p>ルールがまだありません<br>上のボタンから作成しましょう</p></div>';
    return;
  }
  list.innerHTML = appData.rules.map(r => `
    <div class="rule-card" onclick="editRule('${r.id}')">
      <div class="rule-card-info">
        <div class="rule-card-name">${esc(r.name)}</div>
        <div class="rule-card-mode">
          <span class="badge ${r.mode==='四麻'?'badge-4ma':'badge-3ma'}">${r.mode}</span>
          ${r.base_rule ? esc(r.base_rule) : ''}
        </div>
      </div>
      <div class="rule-card-actions">
        <button class="icon-btn" onclick="event.stopPropagation();duplicateRule('${r.id}')" title="コピー">📋</button>
        <button class="icon-btn" onclick="event.stopPropagation();editRule('${r.id}')" title="編集">✏️</button>
        <button class="icon-btn delete" onclick="event.stopPropagation();askDelete('${r.id}')" title="削除">🗑️</button>
      </div>
    </div>
  `).join('');
}

// =====================================================================
// ルールCRUD
// =====================================================================
function createRule(mode) {
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  const def = getDefault(mode);
  const rule = {
    id, mode,
    name: '新規ルール',
    base_rule: mode === '四麻' ? '雀魂（四麻・段位戦）' : '',
    settings: {...def}
  };
  appData.rules.push(rule);
  saveData();
  editRule(id);
}

function editRule(id) {
  editingId = id;
  goEdit();
}

function askDelete(id) {
  deleteTargetId = id;
  document.getElementById('modal-delete').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-delete').classList.remove('show');
  deleteTargetId = null;
}
function confirmDelete() {
  if (deleteTargetId) {
    appData.rules = appData.rules.filter(r => r.id !== deleteTargetId);
    saveData();
  }
  closeModal();
  renderHome();
  showSnack('ルールを削除しました');
}

function duplicateRule(id) {
  const src = getRule(id);
  if (!src) return;
  const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = newId;
  copy.name = src.name + '（コピー）';
  appData.rules.push(copy);
  saveData();
  renderHome();
  showSnack('ルールをコピーしました');
}

// =====================================================================
// 編集画面
// =====================================================================
function renderEdit() {
  const rule = getRule(editingId);
  if (!rule) { goHome(); return; }
  if (!rule.settings.custom_tiles) rule.settings.custom_tiles = [];

  document.getElementById('edit-name').value = rule.name;
  document.getElementById('edit-mode-label').textContent = rule.mode === '四麻' ? '四人麻雀' : '三人麻雀';

  // 基準ルール（四麻のみ）
  const brSection = document.getElementById('base-rule-section');
  const brSelect = document.getElementById('base-rule-select');
  if (rule.mode === '四麻') {
    brSection.classList.remove('hidden');
    brSelect.innerHTML = Object.keys(BASE_RULES_4).map(k =>
      `<option value="${esc(k)}" ${rule.base_rule===k?'selected':''}>${esc(k)}</option>`
    ).join('');
  } else {
    brSection.classList.add('hidden');
  }

  const cats = getCategories(rule.mode);
  const opts = getOptions(rule.mode);
  const base = rule.mode === '四麻' ? getBaseRules('四麻')[rule.base_rule] || {} : null;

  const fields = document.getElementById('edit-fields');
  let html = '';

  if (base) {
    html += '<div class="info-box">💡 色が変わっている項目は、設定した基準ルールからの変更点です。</div>';
  }

  // テキストエリアとして描画するキー
  const textareaKeys = new Set(['yakuman_custom_memo','chombo_memo']);

  // 罰則キー: チョンボに設定されたら動的にチョンボカテゴリに移動
  const penaltyKeys = ['pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan',
    'pen_goron_no_taopai','pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai',
    'pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai'];
  // 現在のチョンボ項目を収集
  const chomboMovedKeys = new Set();
  for (const pk of penaltyKeys) {
    if (rule.settings[pk] === 'チョンボ') chomboMovedKeys.add(pk);
  }

  // カスタムドロップダウン追加用のキー
  const customDropdownKeys = new Set(['mochi_ten','kaeshi_ten','uma','ipponba','oras_oya']);

  for (const cat of cats) {
    const catName = cat[0], keys = cat[1], customizable = cat[2] || false;
    const catKey = catName.replace(/^\d+\.\s*/, '');

    // 特殊牌カテゴリ（空keys）は専用UIを描画
    if (catName.includes('特殊牌')) {
      html += `<div class="category-section"><h2 class="section-title">${esc(catName)}</h2><div class="setting-list">`;
      const tiles = rule.settings.custom_tiles || [];
      for (let i = 0; i < tiles.length; i++) {
        html += `<div class="custom-tile-card" style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <strong>特殊牌 #${i+1}</strong>
            <button onclick="removeCustomTile(${i})" style="background:#E53E3E;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.75rem;">削除</button>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.75rem;color:#666;">牌の名称</label>
            <input type="text" value="${esc(tiles[i].name||'')}" oninput="updateCustomTile(${i},'name',this.value)" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;" placeholder="例: 金牌">
          </div>
          <div>
            <label style="font-size:0.75rem;color:#666;">効果・説明</label>
            <textarea oninput="updateCustomTile(${i},'effect',this.value)" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;min-height:50px;resize:vertical;" placeholder="例: ドラ+チップ3枚">${esc(tiles[i].effect||'')}</textarea>
          </div>
        </div>`;
      }
      html += `<button onclick="addCustomTile()" style="width:100%;padding:10px;background:#3182CE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;">＋ 特殊牌を追加</button>`;
      // 特記事項
      const catMemo = rule.settings['memo_' + catKey] || '';
      html += `<div class="setting-row-textarea" style="margin-top:8px;">
        <label>📝 特記事項</label>
        <textarea data-key="memo_${catKey}" oninput="onSettingChange('memo_${catKey}',this.value)" placeholder="このカテゴリの特記事項...">${esc(catMemo)}</textarea>
      </div>`;
      html += '</div></div>';
      continue;
    }

    html += `<div class="category-section"><h2 class="section-title">${esc(catName)}</h2><div class="setting-list">`;

    // このカテゴリで描画するキーを構築（チョンボ動的移動対応）
    let renderKeys = [...keys];
    if (catName.includes('チョンボ')) {
      // 他カテゴリからチョンボ設定された項目を追加
      for (const pk of chomboMovedKeys) {
        if (!renderKeys.includes(pk)) renderKeys.push(pk);
      }
    } else {
      // チョンボに設定された項目は元カテゴリから除外
      renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k) || keys.includes(k) && catName.includes('チョンボ'));
      // 上がり放棄/軽罰符カテゴリからチョンボ設定項目を除外
      if (catName.includes('上がり放棄') || catName.includes('軽罰符')) {
        renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k));
      }
    }

    for (const k of renderKeys) {
      const val = rule.settings[k] ?? '';
      const isDiff = base && val !== (base[k] ?? '');

      // _custom キー: 親キーが「カスタム」選択時のみ text input 表示
      if (k.endsWith('_custom') && k !== 'yakuman_custom_memo') {
        const parentKey = k.replace('_custom', '');
        if (rule.settings[parentKey] === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <input type="text" data-key="${k}" value="${esc(val)}"
              oninput="onSettingChange('${k}',this.value)"
              placeholder="自由入力..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;">
          </div>`;
        }
        continue;
      }

      // 条件付きtextarea: yakuman_custom_memoは yakuman_type=カスタム時のみ表示
      if (k === 'yakuman_custom_memo') {
        if (rule.settings.yakuman_type === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <textarea data-key="${k}" oninput="onSettingChange('${k}',this.value)" placeholder="カスタム役満の詳細を入力...">${esc(val)}</textarea>
          </div>`;
        }
        continue;
      }

      // 条件付きtextarea: chombo_memoは chombo_batsu=カスタム時のみ表示
      if (k === 'chombo_memo') {
        if (rule.settings.chombo_batsu === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <textarea data-key="${k}" oninput="onSettingChange('${k}',this.value)" placeholder="カスタム罰符の詳細を入力...">${esc(val)}</textarea>
          </div>`;
        }
        continue;
      }

      // ドロップダウン描画
      let options = opts[k] || [val];
      // カスタムドロップダウン: ユーザー追加の選択肢をマージ
      const userOptions = rule.settings['user_options_' + k] || [];
      if (userOptions.length > 0) {
        options = [...options.filter(o => o !== 'カスタム'), ...userOptions, ...(options.includes('カスタム') ? ['カスタム'] : [])];
      }
      // 選択中の値がリストに無ければ追加
      if (val && !options.includes(val)) options = [val, ...options];

      html += `<div class="setting-row ${isDiff?'diff':''}">
        <div class="setting-label">${esc(LABELS[k] || k)}${isDiff?' <span class="diff-badge">変更あり</span>':''}
          ${userOptions.length > 0 || customDropdownKeys.has(k) ?
            `<button onclick="showAddOptionDialog('${k}')" style="background:none;border:none;cursor:pointer;font-size:0.7rem;color:#3182CE;margin-left:4px;" title="選択肢を追加">＋</button>` : ''}
        </div>
        <div class="setting-value"><select data-key="${k}" onchange="onSettingChange('${k}',this.value)">
          ${options.map(o => `<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
        </select></div>
      </div>`;
    }

    // カスタム罰則項目追加UI（customizable=trueのカテゴリ）
    if (customizable) {
      const customItems = rule.settings['custom_' + catKey] || [];
      for (let i = 0; i < customItems.length; i++) {
        html += `<div class="setting-row">
          <div class="setting-label">${esc(customItems[i].name||'項目'+(i+1))}
            <button onclick="removeCustomPenalty('${esc(catKey)}',${i})" style="background:none;border:none;cursor:pointer;font-size:0.7rem;color:#E53E3E;margin-left:4px;" title="削除">×</button>
          </div>
          <div class="setting-value"><input type="text" value="${esc(customItems[i].value||'')}" oninput="updateCustomPenalty('${esc(catKey)}',${i},'value',this.value)"
            placeholder="設定内容" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;"></div>
        </div>`;
      }
      html += `<button onclick="addCustomPenaltyWithPrompt('${esc(catKey)}')" class="btn-add-item">＋ 項目を追加</button>`;
    }

    // 大項目ごとの特記事項
    const catMemo = rule.settings['memo_' + catKey] || '';
    html += `<div class="setting-row-textarea" style="margin-top:8px;">
      <label>📝 特記事項</label>
      <textarea data-key="memo_${catKey}" oninput="onSettingChange('memo_${catKey}',this.value)" placeholder="このカテゴリの特記事項...">${esc(catMemo)}</textarea>
    </div>`;

    html += '</div></div>';
  }
  fields.innerHTML = html;
}

function onNameChange(val) {
  const rule = getRule(editingId);
  if (rule) { rule.name = val; saveData(); }
}
function onBaseRuleChange(val) {
  const rule = getRule(editingId);
  if (rule) { rule.base_rule = val; saveData(); renderEdit(); }
}
function onSettingChange(key, val) {
  const rule = getRule(editingId);
  if (rule) { rule.settings[key] = val; saveData(); }

  // カスタム系ドロップダウンや罰則キーが変わったら再描画
  const reRenderKeys = new Set(['yakuman_type','chombo_batsu','mochi_ten','kaeshi_ten','uma','ipponba','oras_oya',
    'pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan','pen_goron_no_taopai',
    'pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai','pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai']);
  if (reRenderKeys.has(key)) {
    renderEdit();
    return;
  }

  // 差分更新（四麻のみ）
  if (rule && rule.mode === '四麻') {
    const base = getBaseRules('四麻')[rule.base_rule] || {};
    const row = document.querySelector(`[data-key="${key}"]`)?.closest('.setting-row');
    if (row) {
      const isDiff = val !== (base[key] ?? '');
      row.classList.toggle('diff', isDiff);
      const badge = row.querySelector('.diff-badge');
      if (isDiff && !badge) {
        row.querySelector('.setting-label').insertAdjacentHTML('beforeend','<span class="diff-badge">変更あり</span>');
      } else if (!isDiff && badge) {
        badge.remove();
      }
    }
  }
}

function removeUserOption(key, optVal) {
  const rule = getRule(editingId);
  if (!rule) return;
  const k = 'user_options_' + key;
  if (!rule.settings[k]) return;
  rule.settings[k] = rule.settings[k].filter(o => o !== optVal);
  // 現在の値がこの選択肢だった場合、デフォルトに戻す
  if (rule.settings[key] === optVal) {
    const opts = getOptions(rule.mode);
    rule.settings[key] = (opts[key] || [''])[0];
  }
  saveData();
  renderEdit();
}

// =====================================================================
// プレビュー画面
// =====================================================================
function renderPreview() {
  const rule = getRule(editingId);
  if (!rule) return;

  const cats = getCategories(rule.mode);
  const base = rule.mode === '四麻' ? getBaseRules('四麻')[rule.base_rule] || {} : null;
  const modeInfo = rule.mode === '四麻' ? `基準: ${rule.base_rule}` : '三人麻雀ルール';

  const penaltyKeys = ['pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan','pen_goron_no_taopai','pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai','pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai'];
  const chomboMovedKeys = new Set();
  for (const pk of penaltyKeys) { if (rule.settings[pk] === 'チョンボ') chomboMovedKeys.add(pk); }

  let html = `<div class="pv-header"><h2>${esc(rule.name)}（${rule.mode}）</h2><p>${esc(modeInfo)}</p></div>`;

  for (const cat of cats) {
    const catName = cat[0], keys = cat[1], customizable = cat[2] || false;
    const catKey = catName.replace(/^\d+\.\s*/, '');
    // 特殊牌カテゴリ
    if (catName.includes('特殊牌')) {
      const tiles = rule.settings.custom_tiles || [];
      if (tiles.length > 0) {
        html += `<div class="pv-cat">■ ${esc(catName)}</div>`;
        for (const t of tiles) {
          if (t.name || t.effect) {
            html += `<div class="pv-row"><span class="pv-key">🀄 ${esc(t.name||'(未設定)')}</span><span class="pv-val">${esc(t.effect||'')}</span></div>`;
          }
        }
      }
      const cm1 = rule.settings['memo_' + catKey] || '';
      if (cm1) html += `<div class="pv-memo">📝 ${esc(cm1)}</div>`;
      continue;
    }

    let renderKeys = [...keys];
    if (catName.includes('チョンボ')) { for (const pk of chomboMovedKeys) { if (!renderKeys.includes(pk)) renderKeys.push(pk); } }
    else if (catName.includes('上がり放棄') || catName.includes('軽罰符')) { renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k)); }

    html += `<div class="pv-cat">■ ${esc(catName)}</div>`;
    for (const k of renderKeys) {
      // _custom キー: 親キーが「カスタム」時にプレビュー表示
      if (k.endsWith('_custom') && k !== 'yakuman_custom_memo') {
        const parentKey = k.replace('_custom', '');
        if (rule.settings[parentKey] === 'カスタム') {
          const customVal = rule.settings[k] || '';
          if (customVal) html += `<div class="pv-memo">📝 ${esc(LABELS[k]||k)}: ${esc(customVal)}</div>`;
        }
        continue;
      }
      // 条件付きtextarea: カスタム時のみ表示
      if (k === 'yakuman_custom_memo') {
        if (rule.settings.yakuman_type === 'カスタム') {
          const memo = rule.settings[k] || '';
          if (memo) html += `<div class="pv-memo">📝 ${esc(memo)}</div>`;
        }
        continue;
      }
      if (k === 'chombo_memo') {
        if (rule.settings.chombo_batsu === 'カスタム') {
          const memo = rule.settings[k] || '';
          if (memo) html += `<div class="pv-memo">📝 ${esc(memo)}</div>`;
        }
        continue;
      }

      const val = rule.settings[k] ?? '';
      const isDiff = base && val !== (base[k] ?? '');
      html += `<div class="pv-row ${isDiff?'diff':''}">
        <span class="pv-key">${esc(LABELS[k]||k)}</span>
        <span class="pv-val">${esc(val)}</span>
      </div>`;
    }
    // カスタム罰則項目のプレビュー表示
    if (customizable) {
      const catKey = catName.replace(/^\d+\.\s*/, '');
      const customItems = rule.settings['custom_' + catKey] || [];
      for (const item of customItems) {
        if (item.name || item.value) {
          html += `<div class="pv-row"><span class="pv-key">${esc(item.name||'(未設定)')}</span><span class="pv-val">${esc(item.value||'')}</span></div>`;
        }
      }
    }

    // ユーザー追加項目
    const userItems = rule.settings['user_items_' + catKey] || [];
    for (const item of userItems) {
      if (item.name || item.value) {
        html += `<div class="pv-row"><span class="pv-key">${esc(item.name||'(未設定)')}</span><span class="pv-val">${esc(item.value||'')}</span></div>`;
      }
    }

    // カテゴリ特記事項
    const catMemo = rule.settings['memo_' + catKey] || '';
    if (catMemo) html += `<div class="pv-memo">📝 ${esc(catMemo)}</div>`;
  }

  document.getElementById('preview-area').innerHTML = html;
}

// =====================================================================
// エクスポート
// =====================================================================
async function exportImage() {
  const el = document.getElementById('preview-area');
  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const link = document.createElement('a');
    link.download = (getRule(editingId)?.name || 'rule') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showSnack('📷 画像を保存しました');
  } catch(e) { showSnack('画像の保存に失敗しました'); }
}

async function exportPDF() {
  const el = document.getElementById('preview-area');
  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfW = 190; // 左右10mmマージン
    const pageH = 277; // 上下10mmマージン
    const imgW = pdfW;
    const imgH = (canvas.height * imgW) / canvas.width;
    let y = 0;
    let page = 0;
    while (y < imgH) {
      if (page > 0) pdf.addPage();
      // キャンバスから部分を切り出し
      const srcY = (y / imgH) * canvas.height;
      const srcH = Math.min((pageH / imgH) * canvas.height, canvas.height - srcY);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = srcH;
      sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
      const sliceData = sliceCanvas.toDataURL('image/png');
      const sliceH = (srcH * imgW) / canvas.width;
      pdf.addImage(sliceData, 'PNG', 10, 10, imgW, sliceH);
      y += pageH;
      page++;
    }
    pdf.save((getRule(editingId)?.name || 'rule') + '.pdf');
    showSnack('📄 PDFを保存しました');
  } catch(e) { showSnack('PDFの保存に失敗しました'); }
}

// =====================================================================
// ユーティリティ
// =====================================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// PWA インストール

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-banner').classList.remove('show');
      deferredPrompt = null;
    });
  }
}

// Service Worker 登録
// =====================================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated') {
            window.location.reload();
          }
        });
      }
    });
  }).catch(() => {});
}
