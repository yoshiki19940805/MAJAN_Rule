<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="麻雀のルールを簡単に作成・共有できるWebアプリ。三人麻雀・四人麻雀対応。">
<meta name="theme-color" content="#F0F2F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>麻雀ルール共有アプリ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<!-- React / Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    important: '#react-home-root', // Reactルート内ではTailwindクラスを優先させる
    corePlugins: {
      preflight: false, // 既存のstyle.cssと競合するため無効化
    }
  }
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* React用のスクロールバー非表示とアニメーションはここに隔離 */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideUp {
    from { transform: translate(-50%, 100%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }
  .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  
  /* preflight無効化の代償として必要なTailwindリセットをReact側にのみ適用 */
  #react-home-root * {
    border-color: #e5e7eb;
    border-style: solid;
    border-width: 0;
    box-sizing: border-box;
  }
  #react-home-root button {
    background-color: transparent;
    background-image: none;
    line-height: inherit;
    color: inherit;
    margin: 0;
    padding: 0;
    font-family: inherit;
    font-size: 100%;
    text-transform: none;
  }
</style>
</head>
<body>
<div class="app" id="app" style="background-color: transparent;"> <!-- style.cssの背景を上書きさせない -->
  <!-- ホーム画面 (React化) -->
  <div class="screen active" style="padding:0; background-color: transparent;" id="screen-home">
    <div id="react-home-root" style="flex:1; display:flex; flex-direction:column; height: 100%;"></div>
  </div>

  <!-- 編集画面 -->
  <div class="screen" id="screen-edit">
    <div class="header">
      <button class="header-back" onclick="goHomeWithConfirm()">← 戻る</button>
      <span class="header-title" id="edit-mode-label"></span>
      <div style="display:flex;gap:6px" id="edit-header-btns">
        <button class="btn btn-sm btn-green" id="btn-save" onclick="saveAndGoHome()">保存</button>
        <button class="btn btn-sm btn-green" id="btn-preview" onclick="goPreview()">プレビュー</button>
        <button class="btn btn-sm btn-purple" id="btn-copy-shared" style="display:none;" onclick="copySharedRule()">コピーして保存</button>
      </div>
    </div>
    <div class="name-input-wrap">
      <label>ルール名</label>
      <input type="text" class="name-input" id="edit-name" placeholder="ルール名を入力" oninput="onNameChange(this.value)">
    </div>
    <div id="base-rule-section" class="base-rule-wrap hidden">
      <label>比較基準（ベースルール）</label>

      <select id="base-rule-select" onchange="onBaseRuleChange(this.value)"></select>
    </div>
    <div class="edit-scroll" id="edit-fields"></div>
  </div>
  <!-- 標準ルールの管理画面 -->
  <div class="screen" id="screen-custom-base-manager">
    <div class="header">
      <button class="header-back" onclick="showScreen('home')">← ホーム</button>
      <span class="header-title">標準ルール管理</span>
      <div style="width:50px"></div>
    </div>
    <div style="padding: 1rem;">
      <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
        <button class="btn btn-green" onclick="createNewCustomBase('四麻')">+ 新規作成 (四麻)</button>
        <button class="btn btn-green" onclick="createNewCustomBase('三麻')">+ 新規作成 (三麻)</button>
      </div>
      <div id="custom-base-list" class="rule-list"></div>
    </div>
  </div>

  <!-- 標準ルールの編集画面 -->
  <div class="screen" id="screen-custom-base-editor">
    <div class="header">
      <button class="header-back" onclick="showScreen('custom-base-manager')">← 戻る</button>
      <span class="header-title" id="custom-base-title">標準ルール編集</span>
      <button class="btn btn-green" style="padding:4px 8px;font-size:0.8rem" onclick="saveCustomBaseRule()">保存</button>
    </div>
    <div class="edit-form">
      <div class="setting-row">
        <label class="setting-label">ルール名</label>
        <input type="text" id="custom-base-name" style="flex:1" placeholder="例：うちのローカルルール">
      </div>
      <div class="setting-row">
        <label class="setting-label">コピー元 (未選択でデフォルト)</label>
        <select id="custom-base-source" onchange="copyBaseToCustom()"></select>
      </div>
      <div id="custom-base-editor-items"></div>
    </div>
  </div>


  <!-- プレビュー画面 -->
  <div class="screen" id="screen-preview">
    <div class="header">
      <button class="header-back" onclick="goEdit()">← 編集に戻る</button>
      <span class="header-title">出力プレビュー</span>
      <div style="width:50px"></div>
    </div>
    <div class="preview-content">
      <div id="preview-area"></div>
    </div>
    <div class="export-btns">
      <div class="btn-row">
        <button class="btn btn-green" onclick="exportImage()">📷 画像を保存</button>
        <button class="btn btn-orange" onclick="exportPDF()">📄 PDFを保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal-box">
    <p>このルールを削除しますか？</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-red" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<!-- スナックバー -->
<div class="snackbar" id="snackbar"></div>

<!-- 外部ライブラリ -->

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = JSON.parse(raw);
  } catch(e) { appData = { rules: [] }; }
  // マイグレーション: 古いデータに不足しているキーをデフォルト値で補完
  let migrated = false;
  for (const rule of appData.rules) {
    const def = getDefault(rule.mode);
    const cats = getCategories(rule.mode);
    for (const [, keys] of cats) {
      for (const k of keys) {
        if (!(k in rule.settings)) {
          rule.settings[k] = def[k] ?? '';
          migrated = true;
        }
      }
    }
  }
  if (migrated) saveData();
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

function getBaseRuleName(k) { return k?.startsWith('__custom__') && customBaseRules[k.replace('__custom__','')] ? customBaseRules[k.replace('__custom__','')].name : (k || ''); }
function getRule(id) { return appData.rules.find(r => r.id === id); }
function getOptions(mode) { return mode === '四麻' ? OPTIONS_4 : OPTIONS_3; }
function getCategories(mode) { return mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3; }
function getBaseRules(mode) {
  const base = mode === '四麻' ? {...BASE_RULES_4} : {...BASE_RULES_3};
  for (const [id, rule] of Object.entries(customBaseRules)) {
    if (rule.mode === mode) {
      base['__custom__' + id] = rule.settings;
    }
  }
  return base;
}
function getDefault(mode) { return mode === '四麻' ? {...DEFAULT_4} : {...DEFAULT_3}; }

// =====================================================================
// 共有機能 (エクスポート＆インポート)
// =====================================================================
function shareRule(id) {
  const rule = getRule(id);
  if (!rule) return;
  
  // 不要な肥大化データの除外 (例: custom_tiles が空なら除外)
  const exportData = {
    m: rule.mode,
    n: rule.name,
    b: rule.base_rule,
    s: rule.settings
  };
  
  try {
    const jsonStr = JSON.stringify(exportData);
    // LZStringによって安全なURL用文字列に圧縮＆エンコード
    const compressedStr = LZString.compressToEncodedURIComponent(jsonStr);
    
    const url = new URL(window.location.href);
    url.searchParams.set('share', compressedStr);
    
    navigator.clipboard.writeText(url.href).then(() => {
      showSnack('🔗 共有リンクをコピーしました');
    }).catch(() => {
      alert('リンクのコピーに失敗しました。以下のURLをコピーしてください：\n\n' + url.href);
    });
  } catch (e) {
    showSnack('共有リンクの生成に失敗しました');
  }
}

function checkSharedRule() {
  const urlParams = new URLSearchParams(window.location.search);
  const shareData = urlParams.get('share');
  if (shareData) {
    try {
      // ① 最新の LZString でデコード＆展開を試行
      let jsonStr = null;
      try {
        jsonStr = LZString.decompressFromEncodedURIComponent(shareData);
      } catch (err) { /* 無視して次へ */ }

      // ② レガシー仕様（v4.8以下）の Base64URL 形式だった場合のフォールバック
      if (!jsonStr) {
        let sanitizedBase64 = shareData.replace(/-/g, '+').replace(/_/g, '/').replace(/ /g, '+');
        while (sanitizedBase64.length % 4) sanitizedBase64 += '=';
        jsonStr = decodeURIComponent(atob(sanitizedBase64));
      }

      if (!jsonStr) throw new Error("Decompression produced empty string");
      const parsed = JSON.parse(jsonStr);
      
      const id = 'shared_' + Date.now();
      const sharedRule = {
        id: id,
        mode: parsed.m || '四麻',
        name: parsed.n || '共有ルール',
        base_rule: parsed.b || '',
        settings: parsed.s || {},
        readonly: true
      };
      
      // 既存のリストには入れず一時データとして扱う
      appData.rules.push(sharedRule); 
      isSharedMode = true;
      editingId = id;
      
      // URLからパラメータを消去
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
      
      renderEdit();
      showScreen('edit');
      return true;
    } catch (e) {
      console.error(e);
      alert('共有ルールの読み込みに失敗しました。\n原因: ' + (e.message || 'データ破損等'));
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
    }
  }
  return false;
}

function createRule(mode) {
  _editSnapshot = JSON.stringify(appData);
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  const def = getDefault(mode);
  const defBaseKey = mode === '四麻' ? (localStorage.getItem('mahjong_default_base_4ma') || '__custom__preset_jantama_4')
                                     : (localStorage.getItem('mahjong_default_base_3ma') || '__custom__preset_zoo_3');
  const rule = {
    id, mode,
    name: '新規ルール',
    base_rule: defBaseKey,
    settings: JSON.parse(JSON.stringify(def))
  };
  appData.rules.push(rule);
  saveData();
  isSharedMode = false;
  editingId = id;
  goEdit();
}

function editRule(id) {
  _editSnapshot = JSON.stringify(appData);
  const rule = getRule(id);
  // コピー等で保存された readonly ルールの場合は isSharedMode 相当の閲覧専用として扱う
  isSharedMode = rule && rule.readonly === true;
  editingId = id;
  goEdit();
}

  showSnack('ルールを削除しました');

function duplicateRule(id) {
  const src = getRule(id);
  if (!src) return;
  const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = newId;
  copy.name = src.name + '（コピー）';
  appData.rules.push(copy);
  saveData();
  renderHome();
  showSnack('ルールをコピーしました');
}

// =====================================================================
// 編集画面
// =====================================================================
function renderEdit() {
  const rule = getRule(editingId);
  if (!rule) return goHome();

  const titleEl = document.getElementById('edit-mode-label');
  titleEl.innerHTML = `<span class="badge ${rule.mode==='四麻'?'badge-4ma':'badge-3ma'}">${rule.mode}</span> ${isSharedMode ? '（共有ルール）' : 'ルールの編集'}`;

  const nameInput = document.getElementById('edit-name');
  nameInput.value = rule.name;
  nameInput.disabled = isSharedMode;

  const brSelect = document.getElementById('base-rule-select');
  // 閲覧専用でも基準ルールは変更して差分を見られるようにする
  brSelect.disabled = false;

  const brSection = document.getElementById('base-rule-section');
  const bases = getBaseRules(rule.mode);
  
  // ヘッダーボタンの表示切り替え
  document.getElementById('btn-save').style.display = isSharedMode ? 'none' : 'block';
  document.getElementById('btn-preview').style.display = isSharedMode ? 'none' : 'block';
  document.getElementById('btn-copy-shared').style.display = isSharedMode ? 'block' : 'none';

  if (brSection) { // Check if brSection exists
    brSection.classList.remove('hidden');
    let customKeys = Object.keys(bases).filter(k => k.startsWith('__custom__'));
    
    // 現在の base_rule が選択肢内に存在しない場合（古いデータまたは空）、最初の選択肢を自動適用
    if (!customKeys.includes(rule.base_rule) && customKeys.length > 0) {
      rule.base_rule = customKeys[0];
      saveData();
    }
    
    let customHtml = customKeys.map(k => `<option value="${esc(k)}" ${rule.base_rule===k?'selected':''}>${esc(getBaseRuleName(k))}</option>`).join('');
    brSelect.innerHTML = customHtml;
  } else {
    brSection.classList.add('hidden');
  }

  const cats = getCategories(rule.mode);
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const base = getBaseRules(rule.mode)[rule.base_rule] || null;

  const fields = document.getElementById('edit-fields');
  let html = '';

  if (base) {
    html += '<div class="info-box">💡 色が変わっている項目は、設定した基準ルールからの変更点です。</div>';
  }

  // テキストエリアとして描画するキー
  const textareaKeys = new Set(['yakuman_custom_memo','chombo_memo']);

  // 罰則キー: チョンボに設定されたら動的にチョンボカテゴリに移動
  const penaltyKeys = ['pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan',
    'pen_goron_no_taopai','pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai',
    'pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai'];
  // 現在のチョンボ項目を収集
  const chomboMovedKeys = new Set();
  for (const pk of penaltyKeys) {
    if (rule.settings[pk] === 'チョンボ') chomboMovedKeys.add(pk);
  }

  // カスタムドロップダウン追加用のキー（グローバル定義）
  // customDropdownKeys はグローバルスコープで定義済み

  for (const cat of cats) {
    const catName = cat[0], keys = cat[1], customizable = cat[2] || false;
    const catKey = catName.replace(/^\d+\.\s*/, '');

    // 特殊牌カテゴリ（空keys）は専用UIを描画
    if (catName.includes('特殊牌')) {
      html += `<div class="category-section"><h2 class="section-title">${esc(catName)}</h2><div class="setting-list">`;
      const tiles = rule.settings.custom_tiles || [];
      for (let i = 0; i < tiles.length; i++) {
        html += `<div class="custom-tile-card" style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <strong>特殊牌 #${i+1}</strong>
            ${!isSharedMode ? `<button onclick="removeCustomTile(${i})" style="background:#E53E3E;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.75rem;">削除</button>` : ''}
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.75rem;color:#666;">牌の名称</label>
            <input type="text" value="${esc(tiles[i].name||'')}" oninput="updateCustomTile(${i},'name',this.value)" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;" placeholder="例: 金牌" ${isSharedMode ? 'disabled' : ''}>
          </div>
          <div>
            <label style="font-size:0.75rem;color:#666;">効果・説明</label>
            <textarea oninput="updateCustomTile(${i},'effect',this.value)" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;min-height:50px;resize:vertical;" placeholder="例: ドラ+チップ3枚" ${isSharedMode ? 'disabled' : ''}>${esc(tiles[i].effect||'')}</textarea>
          </div>
        </div>`;
      }
      if (!isSharedMode) {
        html += `<button onclick="addCustomTile()" style="width:100%;padding:10px;background:#3182CE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;">＋ 特殊牌を追加</button>`;
      }
      // 特記事項
      const catMemo = rule.settings['memo_' + catKey] || '';
      html += `<div class="setting-row-textarea" style="margin-top:8px;">
        <label>📝 特記事項</label>
        <textarea data-key="memo_${catKey}" oninput="onSettingChange('memo_${catKey}',this.value)" placeholder="このカテゴリの特記事項..." ${isSharedMode ? 'disabled' : ''}>${esc(catMemo)}</textarea>
      </div>`;
      html += '</div></div>';
      continue;
    }

    html += `<div class="category-section"><h2 class="section-title">${esc(catName)}</h2><div class="setting-list">`;

    // このカテゴリで描画するキーを構築（チョンボ動的移動対応）
    let renderKeys = [...keys];
    if (catName.includes('チョンボ')) {
      // 他カテゴリからチョンボ設定された項目を追加
      for (const pk of chomboMovedKeys) {
        if (!renderKeys.includes(pk)) renderKeys.push(pk);
      }
    } else {
      // チョンボに設定された項目は元カテゴリから除外
      renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k) || keys.includes(k) && catName.includes('チョンボ'));
      // 上がり放棄/軽罰符カテゴリからチョンボ設定項目を除外
      if (catName.includes('上がり放棄') || catName.includes('軽罰符')) {
        renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k));
      }
    }

    const deletedKeys = new Set(rule.settings.deleted_keys || []);
    for (const k of renderKeys) {
      // 削除済みキーはスキップ
      if (deletedKeys.has(k)) continue;
      const val = rule.settings[k] ?? '';
      const isDiff = base && (!(k in base) || val !== String(base[k] || ""));

      // _custom キー: 親キーが「カスタム」選択時のみ text input 表示
      if (k.endsWith('_custom') && k !== 'yakuman_custom_memo') {
        const parentKey = k.replace('_custom', '');
        if (rule.settings[parentKey] === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <input type="text" data-key="${k}" value="${esc(val)}"
              oninput="onSettingChange('${k}',this.value)"
              placeholder="自由入力..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;" ${isSharedMode ? 'disabled' : ''}>
          </div>`;
        }
        continue;
      }

      // 条件付きtextarea: yakuman_custom_memoは yakuman_type=カスタム時のみ表示
      if (k === 'yakuman_custom_memo') {
        if (rule.settings.yakuman_type === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <textarea data-key="${k}" oninput="onSettingChange('${k}',this.value)" placeholder="カスタム役満の詳細を入力..." ${isSharedMode ? 'disabled' : ''}>${esc(val)}</textarea>
          </div>`;
        }
        continue;
      }

      // 条件付きtextarea: chombo_memoは chombo_batsu=カスタム時のみ表示
      if (k === 'chombo_memo') {
        if (rule.settings.chombo_batsu === 'カスタム') {
          html += `<div class="setting-row-textarea">
            <label>📝 ${esc(LABELS[k] || k)}</label>
            <textarea data-key="${k}" oninput="onSettingChange('${k}',this.value)" placeholder="カスタム罰符の詳細を入力..." ${isSharedMode ? 'disabled' : ''}>${esc(val)}</textarea>
          </div>`;
        }
        continue;
      }

      // ドロップダウン描画
      let options = opts[k] || [val];
      // カスタムドロップダウン: ユーザー追加の選択肢をマージ
      const userOptions = rule.settings['user_options_' + k] || [];
      if (userOptions.length > 0) {
        options = [...options.filter(o => o !== 'カスタム'), ...userOptions, ...(options.includes('カスタム') ? ['カスタム'] : [])];
      }
      // 選択中の値がリストに無ければ追加
      if (val && !options.includes(val)) options = [val, ...options];

      html += `<div class="swipe-row" data-actions-width="120" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event)">
        <div class="setting-row ${isDiff?'diff':''} swipe-content">
        <div class="setting-label">${esc(LABELS[k] || k)}${isDiff?' <span class="diff-badge">変更あり</span>':''}
        </div>
        <div class="setting-value"><select data-key="${k}" onchange="onSettingChange('${k}',this.value)" ${isSharedMode ? 'disabled' : ''}>
          ${options.map(o => `<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
        </select></div>
      </div>
        ${!isSharedMode ? `<div class="swipe-actions" style="width:120px;"><button class="swipe-edit-btn" onclick="showEditOptionsDialog('${k}')">編集</button><button class="swipe-delete-btn" onclick="removeSettingKey('${k}')">削除</button></div>` : ''}
      </div>`;
    }


    // カスタム追加項目（全カテゴリ共通）
    {
      const customItems = rule.settings['custom_' + catKey] || [];
      for (let i = 0; i < customItems.length; i++) {
        const cVal = customItems[i].value || '';
        const cOpts = cVal ? [cVal, 'カスタム'] : ['カスタム'];
        const itemName = customItems[i].name || ('項目'+(i+1));
        const baseCustomItems = (base && base['custom_' + catKey]) || [];
        const bItem = baseCustomItems.find(x => x.name === itemName);
        const isDiff = base && (!bItem || cVal !== String(bItem.value || ""));

        html += `<div class="swipe-row" data-actions-width="120" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event)">
          <div class="setting-row ${isDiff?'diff':''} swipe-content">
            <div class="setting-label">${esc(itemName)}${isDiff?' <span class="diff-badge">変更あり</span>':''}</div>
            <div class="setting-value"><select onchange="onCustomPenaltySelect('${esc(catKey)}',${i},this.value)" ${isSharedMode ? 'disabled' : ''}>
              ${cOpts.map(o => `<option value="${esc(o)}" ${cVal===o?'selected':''}>${esc(o)}</option>`).join('')}
            </select></div>
          </div>
          ${!isSharedMode ? `<div class="swipe-actions" style="width:120px;"><button class="swipe-edit-btn" onclick="editCustomPenaltyName('${esc(catKey)}',${i})">編集</button><button class="swipe-delete-btn" onclick="removeCustomPenalty('${esc(catKey)}',${i})">削除</button></div>` : ''}
        </div>`;
      }
      if (!isSharedMode) {
        html += `<button onclick="addCustomPenaltyWithPrompt('${esc(catKey)}')" class="btn-add-item">＋ 項目を追加</button>`;
      }
    }

    // 大項目ごとの特記事項
    const catMemo = rule.settings['memo_' + catKey] || '';
    html += `<div class="setting-row-textarea" style="margin-top:8px;">
      <label>📝 特記事項</label>
      <textarea data-key="memo_${catKey}" oninput="onSettingChange('memo_${catKey}',this.value)" placeholder="このカテゴリの特記事項..." ${isSharedMode ? 'disabled' : ''}>${esc(catMemo)}</textarea>
    </div>`;

    html += '</div></div>';
  }
  fields.innerHTML = html;
}

function onNameChange(val) {
  const rule = getRule(editingId);
  if (rule) { rule.name = val; saveData(); }
}
function onBaseRuleChange(val) {
  const rule = getRule(editingId);
  if (rule) {
    rule.base_rule = val;
    // 閲覧専用ルールの単なる比較用変更であれば永続保存はしない
    if (!isSharedMode) saveData();
    renderEdit();
  }
}
function onSettingChange(key, val) {
  const rule = getRule(editingId);
  if (rule) { rule.settings[key] = val; saveData(); }

  // カスタム選択時にpromptで値入力→リストに追加
  if (val === 'カスタム' && customDropdownKeys.has(key)) {
    setTimeout(() => showAddOptionDialog(key), 50);
    return;
  }

  // カスタム系ドロップダウンや罰則キーが変わったら再描画
  const reRenderKeys = new Set(['yakuman_type','chombo_batsu','mochi_ten','kaeshi_ten','uma','ipponba','oras_oya',
    'pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan','pen_goron_no_taopai',
    'pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai','pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai']);
  if (reRenderKeys.has(key)) {
    renderEdit();
    return;
  }

  // 差分更新（四麻・三麻共通）
  if (rule) {
    const base = getBaseRules(rule.mode)[rule.base_rule] || {};
    const row = document.querySelector(`[data-key="${key}"]`)?.closest('.setting-row');
    if (row) {
      const isDiff = (!(key in base) || val !== String(base[key] || ""));
      row.classList.toggle('diff', isDiff);
      const badge = row.querySelector('.diff-badge');
      if (isDiff && !badge) {
        row.querySelector('.setting-label').insertAdjacentHTML('beforeend','<span class="diff-badge">変更あり</span>');
      } else if (!isDiff && badge) {
        badge.remove();
      }
    }
  }
}

// --- スワイプ削除 ---
let _swipeStartX = 0;
let _swipeStartOffset = 0;
function swipeStart(e) {
  _swipeStartX = e.touches[0].clientX;
  const content = e.currentTarget.querySelector('.swipe-content');
  if (content) {
    content.style.transition = 'none';
    _swipeStartOffset = parseFloat(content.style.transform.replace(/[^-\d.]/g,'')) || 0;
  }
}
function swipeMove(e) {
  const dx = e.touches[0].clientX - _swipeStartX;
  const content = e.currentTarget.querySelector('.swipe-content');
  if (!content) return;
  const maxSlide = parseInt(e.currentTarget.dataset.actionsWidth) || 60;
  const newX = Math.min(0, Math.max(-maxSlide, _swipeStartOffset + dx));
  content.style.transform = 'translateX(' + newX + 'px)';
}
function swipeEnd(e) {
  const content = e.currentTarget.querySelector('.swipe-content');
  if (!content) return;
  content.style.transition = 'transform 0.2s ease';
  const maxSlide = parseInt(e.currentTarget.dataset.actionsWidth) || 60;
  const cur = parseFloat(content.style.transform.replace(/[^-\d.]/g,'')) || 0;
  content.style.transform = cur < -(maxSlide / 2) ? 'translateX(-' + maxSlide + 'px)' : 'translateX(0)';
}
// --- 既存項目の削除 ---
function removeSettingKey(key) {
  const rule = getRule(editingId);
  if (!rule) return;
  if (!rule.settings.deleted_keys) rule.settings.deleted_keys = [];
  if (!rule.settings.deleted_keys.includes(key)) {
    rule.settings.deleted_keys.push(key);
  }
  delete rule.settings[key];
  // _customキーも削除
  if (rule.settings[key + '_custom'] !== undefined) delete rule.settings[key + '_custom'];
  // user_optionsも削除
  if (rule.settings['user_options_' + key]) delete rule.settings['user_options_' + key];
  saveData();
  renderEdit();
}

// --- 選択肢編集ダイアログ ---
function showEditOptionsDialog(key) {
  const rule = getRule(editingId);
  if (!rule) return;
  const label = LABELS[key] || key;
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const defaultOpts = opts[key] || [];
  const userOpts = rule.settings['user_options_' + key] || [];

  // モーダル要素を作成
  const overlay = document.createElement('div');
  overlay.id = 'edit-options-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';

  let html = `<div style="background:#fff;border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;padding:20px;">
    <h3 style="margin:0 0 16px;font-size:1rem;">📝 ${esc(label)} の選択肢を編集</h3>
    <div style="font-size:0.75rem;color:#888;margin-bottom:12px;">※ デフォルト項目は編集できません</div>`;

  // デフォルト選択肢（編集不可）
  for (const o of defaultOpts) {
    if (o === 'カスタム') continue;
    html += `<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;">
      <span style="flex:1;font-size:0.85rem;color:#666;">${esc(o)}</span>
      <span style="font-size:0.7rem;color:#aaa;">デフォルト</span>
    </div>`;
  }

  // ユーザー追加選択肢（編集・削除可能）
  for (let i = 0; i < userOpts.length; i++) {
    html += `<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;gap:8px;">
      <input type="text" value="${esc(userOpts[i])}" data-user-opt-idx="${i}" style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem;">
      <button onclick="editUserOption('${esc(key)}',${i},this)" style="background:#3182CE;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.75rem;white-space:nowrap;">保存</button>
      <button onclick="removeUserOptionAndClose('${esc(key)}','${esc(userOpts[i])}')" style="background:#E53E3E;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.75rem;white-space:nowrap;">削除</button>
    </div>`;
  }

  // カスタム（追加ボタン）
  html += `<div style="margin-top:12px;">
    <button onclick="addOptionFromDialog('${esc(key)}')" style="width:100%;padding:10px;background:#3182CE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">＋ 選択肢を追加</button>
  </div>
  <div style="margin-top:12px;">
    <button onclick="closeEditOptionsDialog()" style="width:100%;padding:10px;background:#eee;color:#333;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">閉じる</button>
  </div>
  </div>`;

  overlay.innerHTML = html;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeEditOptionsDialog(); });
  document.body.appendChild(overlay);
}

function closeEditOptionsDialog() {
  const overlay = document.getElementById('edit-options-overlay');
  if (overlay) overlay.remove();
}

function editUserOption(key, idx, btn) {
  const rule = getRule(editingId);
  if (!rule) return;
  const k = 'user_options_' + key;
  if (!rule.settings[k] || !rule.settings[k][idx]) return;
  const input = btn.parentElement.querySelector('input');
  const newVal = input.value.trim();
  if (!newVal) return;
  const oldVal = rule.settings[k][idx];
  rule.settings[k][idx] = newVal;
  // 現在選択中の値も更新
  if (rule.settings[key] === oldVal) {
    rule.settings[key] = newVal;
  }
  saveData();
  closeEditOptionsDialog();
  renderEdit();
}

function removeUserOptionAndClose(key, optVal) {
  const rule = getRule(editingId);
  if (!rule) return;
  const k = 'user_options_' + key;
  if (!rule.settings[k]) return;
  rule.settings[k] = rule.settings[k].filter(o => o !== optVal);
  if (rule.settings[key] === optVal) {
    const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
    rule.settings[key] = (opts[key] || [''])[0];
  }
  saveData();
  closeEditOptionsDialog();
  renderEdit();
}

function addOptionFromDialog(key) {
  const label = LABELS[key] || key;
  const val = prompt('"' + label + '"に追加する値を入力:');
  if (!val || !val.trim()) return;
  const rule = getRule(editingId);
  if (!rule) return;
  const k = 'user_options_' + key;
  if (!rule.settings[k]) rule.settings[k] = [];
  if (!rule.settings[k].includes(val.trim())) {
    rule.settings[k].push(val.trim());
  }
  rule.settings[key] = val.trim();
  saveData();
  closeEditOptionsDialog();
  renderEdit();
}

function removeUserOption(key, optVal) {
  const rule = getRule(editingId);
  if (!rule) return;
  const k = 'user_options_' + key;
  if (!rule.settings[k]) return;
  rule.settings[k] = rule.settings[k].filter(o => o !== optVal);
  // 現在の値がこの選択肢だった場合、デフォルトに戻す
  if (rule.settings[key] === optVal) {
    const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
    rule.settings[key] = (opts[key] || [''])[0];
  }
  saveData();
  renderEdit();
}

// =====================================================================
// プレビュー画面
// =====================================================================
function renderPreview() {
  const rule = getRule(editingId);
  if (!rule) return;

  const cats = getCategories(rule.mode);
  const base = getBaseRules(rule.mode)[rule.base_rule] || null;
  const modeInfo = base ? `基準: ${getBaseRuleName(rule.base_rule)}` : (rule.mode === '四麻' ? '四人麻雀ルール' : '三人麻雀ルール');

  const penaltyKeys = ['pen_goron_taopai','pen_noten_reach','pen_reach_bad_ankan','pen_goron_no_taopai','pen_gonaki_sarashi','pen_kuikae_ihan','pen_tahai','pen_gonaki_hassei','pen_reach_torikeshi','pen_shouhai'];
  const chomboMovedKeys = new Set();
  for (const pk of penaltyKeys) { if (rule.settings[pk] === 'チョンボ') chomboMovedKeys.add(pk); }

  let html = `<div class="pv-header"><h2>${esc(rule.name)}（${rule.mode}）</h2><p>${esc(modeInfo)}</p></div>`;

  for (const cat of cats) {
    const catName = cat[0], keys = cat[1], customizable = cat[2] || false;
    const catKey = catName.replace(/^\d+\.\s*/, '');
    // 特殊牌カテゴリ
    if (catName.includes('特殊牌')) {
      const tiles = rule.settings.custom_tiles || [];
      if (tiles.length > 0) {
        html += `<div class="pv-cat">■ ${esc(catName)}</div>`;
        for (const t of tiles) {
          if (t.name || t.effect) {
            html += `<div class="pv-row"><span class="pv-key">🀄 ${esc(t.name||'(未設定)')}</span><span class="pv-val">${esc(t.effect||'')}</span></div>`;
          }
        }
      }
      const cm1 = rule.settings['memo_' + catKey] || '';
      if (cm1) html += `<div class="pv-memo">📝 ${esc(cm1)}</div>`;
      continue;
    }

    let renderKeys = [...keys];
    if (catName.includes('チョンボ')) { for (const pk of chomboMovedKeys) { if (!renderKeys.includes(pk)) renderKeys.push(pk); } }
    else if (catName.includes('上がり放棄') || catName.includes('軽罰符')) { renderKeys = renderKeys.filter(k => !chomboMovedKeys.has(k)); }

    html += `<div class="pv-cat">■ ${esc(catName)}</div>`;
    for (const k of renderKeys) {
      // _custom キー: 親キーが「カスタム」時にプレビュー表示
      if (k.endsWith('_custom') && k !== 'yakuman_custom_memo') {
        const parentKey = k.replace('_custom', '');
        if (rule.settings[parentKey] === 'カスタム') {
          const customVal = rule.settings[k] || '';
          if (customVal) html += `<div class="pv-memo">📝 ${esc(LABELS[k]||k)}: ${esc(customVal)}</div>`;
        }
        continue;
      }
      // 条件付きtextarea: カスタム時のみ表示
      if (k === 'yakuman_custom_memo') {
        if (rule.settings.yakuman_type === 'カスタム') {
          const memo = rule.settings[k] || '';
          if (memo) html += `<div class="pv-memo">📝 ${esc(memo)}</div>`;
        }
        continue;
      }
      if (k === 'chombo_memo') {
        if (rule.settings.chombo_batsu === 'カスタム') {
          const memo = rule.settings[k] || '';
          if (memo) html += `<div class="pv-memo">📝 ${esc(memo)}</div>`;
        }
        continue;
      }

      const val = rule.settings[k] ?? '';
      const isDiff = base && (!(k in base) || val !== String(base[k] || ""));
      html += `<div class="pv-row ${isDiff?'diff':''}">
        <span class="pv-key">${esc(LABELS[k]||k)}</span>
        <span class="pv-val">${esc(val)}</span>
      </div>`;
    }
    // カスタム罰則項目のプレビュー表示
    if (customizable) {
      const catKey = catName.replace(/^\d+\.\s*/, '');
      const customItems = rule.settings['custom_' + catKey] || [];
      for (const item of customItems) {
        if (item.name || item.value) {
          const itemName = item.name || '(未設定)';
          const bItems = (base && base['custom_' + catKey]) || [];
          const bItem = bItems.find(x => x.name === itemName);
          const isDiff = base && (!bItem || item.value !== String(bItem.value || ""));
          html += `<div class="pv-row ${isDiff?'diff':''}"><span class="pv-key">${esc(itemName)}</span><span class="pv-val">${esc(item.value||'')}</span></div>`;
        }
      }
    }

    // ユーザー追加項目
    const userItems = rule.settings['user_items_' + catKey] || [];
    for (const item of userItems) {
      if (item.name || item.value) {
        const itemName = item.name || '(未設定)';
        const bItems = (base && base['user_items_' + catKey]) || [];
        const bItem = bItems.find(x => x.name === itemName);
        const isDiff = base && (!bItem || item.value !== String(bItem.value || ""));
        html += `<div class="pv-row ${isDiff?'diff':''}"><span class="pv-key">${esc(itemName)}</span><span class="pv-val">${esc(item.value||'')}</span></div>`;
      }
    }

    // カテゴリ特記事項
    const catMemo = rule.settings['memo_' + catKey] || '';
    if (catMemo) html += `<div class="pv-memo">📝 ${esc(catMemo)}</div>`;
  }

  document.getElementById('preview-area').innerHTML = html;
}

async function exportImage() {
  const el = document.getElementById('preview-area');
  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const fileName = (getRule(editingId)?.name || 'rule') + '.png';
    // Web Share API が使えればそちらを使う（iOS写真アプリ保存可能）
    if (navigator.share && navigator.canShare) {
      canvas.toBlob(async (blob) => {
        const file = new File([blob], fileName, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: fileName });
            showSnack('📷 共有しました');
          } catch(e) { /* ユーザーがキャンセル */ }
        } else {
          // canShareが非対応の場合はダウンロード
          const link = document.createElement('a');
          link.download = fileName;
          link.href = canvas.toDataURL('image/png');
          link.click();
          showSnack('📷 画像を保存しました');
        }
      }, 'image/png');
    } else {
      const link = document.createElement('a');
      link.download = fileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showSnack('📷 画像を保存しました');
    }
  } catch(e) { showSnack('画像の保存に失敗しました'); }
}

async function exportPDF() {
  const el = document.getElementById('preview-area');
  try {
    // 各カテゴリブロックを個別にキャプチャして改ページ制御
    const blocks = el.querySelectorAll('.pv-category, .pv-header, .pv-memo, h3');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfW = 190;
    const pageH = 277;
    let curY = 10; // 上マージン

    // ブロックがない場合は全体を1枚でキャプチャ
    if (blocks.length === 0) {
      const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
      const imgH = (canvas.height * pdfW) / canvas.width;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, pdfW, Math.min(imgH, pageH));
    } else {
      for (const block of blocks) {
        const canvas = await html2canvas(block, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
        const imgH = (canvas.height * pdfW) / canvas.width;
        // ページに収まらない場合は改ページ
        if (curY + imgH > pageH + 10 && curY > 10) {
          pdf.addPage();
          curY = 10;
        }
        // ブロック自体がページより大きい場合はスライス分割
        if (imgH > pageH) {
          let sy = 0;
          while (sy < canvas.height) {
            if (curY > 10) { pdf.addPage(); curY = 10; }
            const sliceH = Math.min((pageH / pdfW) * canvas.width, canvas.height - sy);
            const sc = document.createElement('canvas');
            sc.width = canvas.width; sc.height = sliceH;
            sc.getContext('2d').drawImage(canvas, 0, sy, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
            const h = (sliceH * pdfW) / canvas.width;
            pdf.addImage(sc.toDataURL('image/png'), 'PNG', 10, curY, pdfW, h);
            curY += h;
            sy += sliceH;
          }
        } else {
          pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, curY, pdfW, imgH);
          curY += imgH;
        }
      }
    }
    pdf.save((getRule(editingId)?.name || 'rule') + '.pdf');
    showSnack('📄 PDFをダウンロードしました');
  } catch(e) { showSnack('PDFの保存に失敗しました'); }
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// =====================================================================
let customBaseRules = {}; // { id: { name, mode, settings } }
let currentCustomBaseId = null;

function loadCustomBaseRules() {
  let isNew = false;
  try {
    const data = localStorage.getItem('mahjong_custom_base_rules');
    if (data) customBaseRules = JSON.parse(data);
    else isNew = true;
  } catch(e) { isNew = true; }

  // 空もしくは初期ロード時
  if (isNew || Object.keys(customBaseRules).length === 0) {
    customBaseRules = {
      "preset_jantama_4": { "name": "雀魂（段位戦）", "mode": "四麻", "settings": {...BASE_RULES_4["雀魂（四麻・段位戦）"]} },
      "preset_tenhou_4": { "name": "天鳳（段位戦）", "mode": "四麻", "settings": {...BASE_RULES_4["天鳳（四麻）"]} },
      "preset_mleague_4": { "name": "Mリーグ", "mode": "四麻", "settings": {...BASE_RULES_4["Mリーグ公式（四麻）"]} },
      "preset_zoo_3": { "name": "三人麻雀（標準）", "mode": "三麻", "settings": {...BASE_RULES_3["三人麻雀（標準）"]} }
    };
    saveCustomBaseRules();
  }
}
loadCustomBaseRules(); // 初期化時に読み込み

// デフォルトベース設定関数
function setDefaultBaseRule(mode, id) {
  if (mode === '四麻') localStorage.setItem('mahjong_default_base_4ma', '__custom__' + id);
  else localStorage.setItem('mahjong_default_base_3ma', '__custom__' + id);
  renderCustomBaseManager(); // 再描画
}

function saveCustomBaseRules() {
  localStorage.setItem('mahjong_custom_base_rules', JSON.stringify(customBaseRules));
}

function createNewCustomBase(mode) {
  currentCustomBaseId = 'custom_' + Date.now();
  customBaseRules[currentCustomBaseId] = {
    name: "新規カスタムルール",
    mode: mode,
    settings: {...(mode === '四麻' ? DEFAULT_4 : DEFAULT_3)}
  };
  openCustomBaseEditor(currentCustomBaseId);
}

function openCustomBaseEditor(id) {
  currentCustomBaseId = id;
  const rule = customBaseRules[id];
  document.getElementById('custom-base-title').textContent = `${rule.mode}基準ルールの編集`;
  document.getElementById('custom-base-name').value = rule.name;
  
  // コピー元セレクトボックス
  const srcSelect = document.getElementById('custom-base-source');
  const bases = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  srcSelect.innerHTML = '<option value="">-- ベースにする基準ルールを選択 --</option>';
  for (const b in bases) {
    srcSelect.insertAdjacentHTML('beforeend', `<option value="${b}">${b}</option>`);
  }
  srcSelect.value = '';

  renderCustomBaseEditorItems();
  showScreen('custom-base-editor');
}

function renderCustomBaseEditorItems() {
  const rule = customBaseRules[currentCustomBaseId];
  const listEl = document.getElementById('custom-base-editor-items');
  listEl.innerHTML = '';
  const cats = rule.mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3;
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;

  cats.forEach(cat => {
    let catTitle = cat[0];
    let catKeys = cat[1];
    let ht = `<div class="category-header" style="background:var(--surface);padding:8px;font-weight:bold;margin-top:8px">${esc(catTitle)}</div>`;
    catKeys.forEach(k => {
      let val = rule.settings[k] ?? '';
      let isText = Array.isArray(opts[k]) && opts[k][0] === "";
      let label = LABELS[k] || k;
      
      if (isText) {
        let pVal = rule.settings[k.replace('_custom', '')] ?? '';
        let isVis = (pVal === 'カスタム');
        ht += `<div class="setting-row" id="cbe-row-${k}" style="display:${isVis?'flex':'none'}; background:var(--surface)">
                 <label class="setting-label">↳ ${label}</label>
                 <input type="text" class="setting-text" value="${esc(val)}" onchange="updateCustomBaseVal('${k}', this.value)" style="flex:1">
               </div>`;
      } else {
        ht += `<div class="setting-row" style="background:var(--surface)">
                 <label class="setting-label">${label}</label>
                 <select class="setting-select" id="cbe-sel-${k}" onchange="updateCustomBaseVal('${k}', this.value); updateCustomBaseSub('${k}')">`;
        opts[k].forEach(o => {
          let sel = (o === val) ? 'selected' : '';
          ht += `<option value="${esc(o)}" ${sel}>${esc(o)}</option>`;
        });
        ht += `  </select></div>`;
      }
    });
    listEl.insertAdjacentHTML('beforeend', ht);
  });
}

function updateCustomBaseVal(key, val) {
  if (currentCustomBaseId && customBaseRules[currentCustomBaseId]) {
    customBaseRules[currentCustomBaseId].settings[key] = val;
  }
}

function updateCustomBaseSub(key) {
  if (!currentCustomBaseId) return;
  const rule = customBaseRules[currentCustomBaseId];
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const customKey = key + '_custom';
  if (opts[customKey]) {
    const row = document.getElementById(`cbe-row-${customKey}`);
    const isCustom = (document.getElementById(`cbe-sel-${key}`).value === 'カスタム');
    if (row) row.style.display = isCustom ? 'flex' : 'none';
  }
}

function copyBaseToCustom() {
  const src = document.getElementById('custom-base-source').value;
  if (!src) return;
  const rule = customBaseRules[currentCustomBaseId];
  const bases = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  if (bases[src]) {
    rule.settings = {...bases[src]};
    renderCustomBaseEditorItems();
    showToast(`「${src}」をコピーしました`);
  }
}

function saveCustomBaseRule() {
  const name = document.getElementById('custom-base-name').value.trim();
  if (!name) { alert("ルール名を入力してください"); return; }
  customBaseRules[currentCustomBaseId].name = name;
  saveCustomBaseRules();
  showToast("保存しました");
  renderCustomBaseManager();
  showScreen('custom-base-manager');
}

function renderCustomBaseManager() {
  const listEl = document.getElementById('custom-base-list');
  listEl.innerHTML = '';
  
  if (Object.keys(customBaseRules).length === 0) {
    listEl.innerHTML = '<div class="no-history" style="text-align:center;padding:2rem;">カスタムルールはありません</div>';
    return;
  }

  const def4 = localStorage.getItem('mahjong_default_base_4ma') || '__custom__preset_jantama_4';
  const def3 = localStorage.getItem('mahjong_default_base_3ma') || '__custom__preset_zoo_3';

  for (const [id, rule] of Object.entries(customBaseRules)) {
    const isDefault = (rule.mode === '四麻' && def4 === '__custom__' + id) || (rule.mode === '三麻' && def3 === '__custom__' + id);
    const btnStyle = isDefault ? 'background:#3182CE;color:#fff;border:none;' : 'background:transparent;color:#666;border:1px solid #ccc;';
    const btnText = isDefault ? '★ デフォルト' : '☆ デフォルトに設定';
    
    const div = document.createElement('div');
    div.className = 'rule-item swipe-item';
    div.innerHTML = `
      <div class="swipe-content" style="display:flex; justify-content:space-between; align-items:center;" onclick="openCustomBaseEditor('${id}')">
        <div>
          <div style="font-weight:bold">${esc(rule.name)}</div>
          <div style="font-size:0.8rem; color:var(--text-sub)">${rule.mode}</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
          <div style="color:#3182CE; font-size:0.9rem;">編集 ＞</div>
          <button onclick="event.stopPropagation(); setDefaultBaseRule('${rule.mode}', '${id}')" style="font-size:0.75rem; padding:4px 8px; border-radius:4px; cursor:pointer; ${btnStyle}">${btnText}</button>
        </div>
      </div>
      <div class="swipe-action swipe-delete" onclick="deleteCustomBase('${id}')">削除</div>
    `;
    listEl.appendChild(div);
  }
  initSwipeDelete(); // スワイプ削除機能の再初期化（既存のイベントを利用）
}

function deleteCustomBase(id) {
  if (confirm("このカスタムルールを削除しますか？")) {
    delete customBaseRules[id];
    saveCustomBaseRules();
    renderCustomBaseManager();
  }
}

// =====================================================================
// アプリ起動 (全ての変数・関数の定義後に実行)
// =====================================================================
loadData();
if (!checkSharedRule()) {
  renderHome();
}
</script>

  const IconShare = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;
  const IconCopy = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
  const IconEdit = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
  const IconTrash = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
  const IconLock = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
  const IconCheck = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
  const IconPlus = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;

  // ==========================================
  // 2. 設定値・標準テーマ定義
  // ==========================================
  const CONFIG = {
    strings: {
      appTitle: "麻雀ルール共有",
      manageStandardRules: "標準ルール管理",
      tab4p: "四人麻雀",
      tab3p: "三人麻雀",
      create4pRule: "新しい四人麻雀ルールを作成",
      create3pRule: "新しい三人麻雀ルールを作成",
      ruleListTitleSuffix: "のルール",
      actionShare: "共有",
      actionCopy: "コピー",
      actionEdit: "編集",
      actionDelete: "削除",
      versionPrefix: "v",
      emptyRules: "ルールが作成されていません",
    },
    appVersion: "5.5(React)",
    buildDate: "2026-03-16 17:20",
  };

  const THEME = {
    fontFamily: "font-sans",
    bgApp: "bg-slate-50",
    bgHeader: "bg-white",
    bgList: "bg-white",
    bgTabContainer: "bg-slate-200/60 p-1 rounded-lg",
    tabActive: "bg-white shadow-sm text-slate-800 font-bold rounded-md",
    tabInactive: "text-slate-500 hover:text-slate-700 font-medium rounded-md",
    textMain: "text-slate-800",
    textSub: "text-slate-500",
    textMuted: "text-slate-400",
    border: "border-slate-200",
    theme4p: "bg-blue-600 active:bg-blue-700 text-white rounded-xl shadow-sm",
    theme3p: "bg-emerald-600 active:bg-emerald-700 text-white rounded-xl shadow-sm",
    indicator4p: "bg-blue-400",
    indicator3p: "bg-emerald-400",
    listContainer: "rounded-xl border shadow-sm",
    listItem: "border-b",
    btnAction: "rounded-md active:bg-slate-100 text-slate-400 hover:text-slate-600",
    btnActionDanger: "rounded-md active:bg-red-50 active:text-red-600 text-slate-400 hover:text-red-600",
    readOnlyIcon: "text-amber-500",
    iconSize: { sm: 14, md: 16, lg: 20 }
  };

  const ActionButton = ({ icon, label, onClick, disabled, isDanger }) => {
    const baseStyle = "p-1.5 transition-colors flex items-center justify-center";
    const colorStyle = isDanger ? THEME.btnActionDanger : THEME.btnAction;
    const disabledStyle = disabled ? "opacity-30 cursor-not-allowed" : "cursor-pointer active:scale-95";

    return (
      <button 
        onClick={onClick} 
        disabled={disabled} 
        aria-label={label}
        className={`${baseStyle} ${disabledStyle} ${!disabled ? colorStyle : ''}`}
      >
        {icon}
      </button>
    );
  };

  // ==========================================
  // 3. メインコンポーネント
  // ==========================================
  function App({ rulesFromVanilla }) {
    const [activeTab, setActiveTab] = useState(4); // 4 = 四人麻雀, 3 = 三人麻雀
    const [showPwaBanner, setShowPwaBanner] = useState(false);
    
    // VanillaJS側で保存されたルールをフィルタリング
    const displayedRules = rulesFromVanilla.filter(rule => (rule.mode === '四麻' ? 4 : 3) === activeTab);

    // PWAインストールバナー表示用
    useEffect(() => {
      window._triggerReactPWABanner = () => setShowPwaBanner(true);
      window._hideReactPWABanner = () => setShowPwaBanner(false);
      // PWAイベントがすでに発火済み（deferredPromptがセットされている）場合はバナーを表示
      if (window.deferredPrompt) {
        setShowPwaBanner(true);
      }
      return () => {
        window._triggerReactPWABanner = null;
        window._hideReactPWABanner = null;
      };
    }, []);

    const handleInstallPWA = () => {
      if (window.installPWA) window.installPWA();
    };

    const handleAction = (action, rule) => {
      switch(action) {
        case 'share': window.shareRule(rule.id); break;
        case 'copy': window.duplicateRule(rule.id); break;
        case 'edit': window.editRule(rule.id); break;
        case 'delete': window.askDelete(rule.id); break;
      }
    };

    return (
      <div className={`relative flex flex-col flex-1 overflow-hidden ${THEME.fontFamily} ${THEME.bgApp} ${THEME.textMain}`}>
        
        {/* 固定ヘッダー */}
        <header className={`flex justify-between items-center px-4 pt-3 pb-2 z-20 shrink-0 ${THEME.bgHeader}`}>
          <h1 className="text-lg font-bold tracking-tight truncate pr-2">
            {CONFIG.strings.appTitle}
          </h1>
          <button 
            onClick={() => window.showScreen('custom-base-manager')}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-semibold transition-colors active:scale-95 ${THEME.bgHeader} shadow-sm ${THEME.border}`}
          >
            <IconSettings size={THEME.iconSize.sm} />
            {CONFIG.strings.manageStandardRules}
          </button>
        </header>

        {/* タブ切り替え（セグメントコントロール） */}
        <div className={`px-4 pb-3 z-20 shrink-0 border-b ${THEME.bgHeader} ${THEME.border}`}>
          <div className={`flex ${THEME.bgTabContainer}`}>
            <button 
              onClick={() => setActiveTab(4)}
              className={`flex-1 py-1.5 text-sm transition-all flex justify-center items-center gap-1.5 ${activeTab === 4 ? THEME.tabActive : THEME.tabInactive}`}
            >
              <IconUsers4 size={16} />
              {CONFIG.strings.tab4p}
            </button>
            <button 
              onClick={() => setActiveTab(3)}
              className={`flex-1 py-1.5 text-sm transition-all flex justify-center items-center gap-1.5 ${activeTab === 3 ? THEME.tabActive : THEME.tabInactive}`}
            >
              <IconUsers3 size={16} />
              {CONFIG.strings.tab3p}
            </button>
          </div>
        </div>

        {/* スクロール可能なメインコンテンツ */}
        <main className="flex-1 overflow-y-auto no-scrollbar p-4 space-y-6 pb-24 relative">
          
          {/* インストールバナー */}
          {showPwaBanner && (
            <div onClick={handleInstallPWA} className="bg-blue-50 text-blue-700 text-xs font-bold px-4 py-3 mb-4 rounded-xl border border-blue-100 flex items-center justify-between cursor-pointer shadow-sm active:scale-95 transition-transform">
              <span>📱 ホーム画面に追加してアプリとして使う</span>
              <button className="bg-blue-600 text-white px-3 py-1.5 rounded-md shadow-sm">追加</button>
            </div>
          )}

          {/* 新規作成ボタン */}
          <section>
            <button 
              onClick={() => window.createRule(activeTab === 4 ? '四麻' : '三麻')}
              className={`w-full flex flex-row items-center justify-center gap-2 p-4 transition-transform active:scale-95 font-bold text-sm ${activeTab === 4 ? THEME.theme4p : THEME.theme3p}`}
            >
              <IconPlus size={THEME.iconSize.lg} />
              {activeTab === 4 ? CONFIG.strings.create4pRule : CONFIG.strings.create3pRule}
            </button>
          </section>

          {/* ルール一覧 */}
          <section>
            <h2 className={`text-sm font-bold mb-2 px-1 ${THEME.textSub}`}>
              {activeTab === 4 ? CONFIG.strings.tab4p : CONFIG.strings.tab3p}{CONFIG.strings.ruleListTitleSuffix} 
              <span className="text-xs font-normal ml-1">({displayedRules.length})</span>
            </h2>
            
            <div className={`overflow-hidden ${THEME.bgList} ${THEME.listContainer}`}>
              {displayedRules.map((rule, index) => (
                <div 
                  key={rule.id} 
                  className={`flex flex-row items-center justify-between p-3 transition-colors cursor-pointer active:bg-slate-50 ${index !== displayedRules.length - 1 ? THEME.listItem : ''} ${THEME.border}`}
                  onClick={() => handleAction('edit', rule)}
                >
                  
                  {/* ルール名とインジケーター */}
                  <div className="flex-1 min-w-0 pr-2 flex flex-col justify-center">
                    <div className="flex flex-row items-center gap-2">
                        {rule.readonly ? (
                            <IconLock size={14} className={`shrink-0 ${THEME.readOnlyIcon}`} title="閲覧専用" />
                        ) : (
                            <div className={`w-1.5 h-4 rounded-full shrink-0 ${activeTab === 4 ? THEME.indicator4p : THEME.indicator3p}`}></div>
                        )}
                        <h3 className={`text-sm font-bold truncate leading-tight ${THEME.textMain}`}>
                            {rule.name}
                        </h3>
                    </div>
                  </div>

                  {/* アクションボタン */}
                  <div className="flex flex-row items-center gap-0.5 shrink-0" onClick={e => e.stopPropagation()}>
                    <ActionButton icon={<IconShare size={THEME.iconSize.md} />} label={CONFIG.strings.actionShare} onClick={() => handleAction('share', rule)} />
                    <ActionButton icon={<IconCopy size={THEME.iconSize.md} />} label={CONFIG.strings.actionCopy} onClick={() => handleAction('copy', rule)} />
                    <ActionButton icon={<IconEdit size={THEME.iconSize.md} />} label={CONFIG.strings.actionEdit} onClick={() => handleAction('edit', rule)} disabled={rule.readonly} />
                    <ActionButton icon={<IconTrash size={THEME.iconSize.md} />} label={CONFIG.strings.actionDelete} onClick={() => handleAction('delete', rule)} disabled={rule.readonly} isDanger />
                  </div>
                </div>
              ))}

              {displayedRules.length === 0 && (
                <div className={`text-center py-10 ${THEME.textMuted}`}>
                  <p className="text-sm font-medium">{CONFIG.strings.emptyRules}</p>
                </div>
              )}
            </div>
          </section>
        </main>

        {/* フッター情報 */}
        <footer className={`absolute bottom-0 w-full pb-safe py-3 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent text-center text-[10px] pointer-events-none ${THEME.textMuted}`}>
          <p className="mt-4">
            {CONFIG.strings.versionPrefix}{CONFIG.appVersion} 
            <span className="mx-1.5">•</span> 
            {CONFIG.buildDate}
          </p>
        </footer>
      </div>
    );
  }

  // Vanilla JSからのレンダリングフック
  window._renderReactHome = function() {
    if (!window.reactRoot) {
      window.reactRoot = ReactDOM.createRoot(document.getElementById('react-home-root'));
    }
    // VanillaJSの現在のステートを伝播させて再描画
    window.reactRoot.render(<App rulesFromVanilla={appData.rules} />);
  }
</script>
</body>
</html>
