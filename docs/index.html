<script>
  // 強制キャッシュクリア
  (function() {
    const currentVersion = "v68";
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('v') !== currentVersion) {
      window.location.replace("?v=" + currentVersion);
    }
  })();
</script>

<style>
  :root {
    --color-bg: #F5F5F7;
    --color-surface: #FFFFFF;
    --color-primary: #007AFF;
    --color-text: #1C1C1E;
    --color-text-muted: #8E8E93;
    --color-border: #E5E5EA;
    --color-danger: #FF3B30;
    --color-highlight-bg: #EAF4FF;
    --color-segmented-bg: #E3E3E8;
    --color-readonly-bg: #F9F9FA;
    
    --app-max-width: 100%;
    --app-padding: 5vw;
  }
  
  body {
    background-color: var(--color-bg);
    color: var(--color-text);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent; 
    overflow-x: hidden;
  }

  .swipe-item {
      position: relative;
      overflow: hidden;
      border-bottom: 0.5px solid var(--color-border);
  }
  .swipe-item:last-child { border-bottom: none; }
  
  .swipe-content {
      position: relative;
      z-index: 10;
      background-color: var(--color-surface);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
  }
  
  .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      display: flex;
      z-index: 5;
  }

  .is-changed .swipe-content { background-color: var(--color-highlight-bg); }
  .is-changed .item-label { color: var(--color-primary); font-weight: 600; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    flex-shrink: 0;
  }

  .app-container {
    width: var(--app-max-width);
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* React用のスクロールバー非表示とアニメーションはここに隔離 */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideUp {
    from { transform: translate(-50%, 100%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }
  .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  
  #screen-home * {
      box-sizing: border-box;
  }
</style>
</head>
<body>
<div class="app" id="app" style="background-color: transparent;"> <!-- style.cssの背景を上書きさせない -->
  <!-- ホーム画面 (React化) -->
  <div class="screen active" style="padding:0; background-color: var(--color-bg);" id="screen-home">
    <div id="react-home-root" style="flex:1; display:flex; flex-direction:column; height: 100%;"></div>
  </div>
  <!-- 編集画面 -->
  <div class="screen bg-theme-bg" id="screen-edit">
    <nav class="shrink-0 pt-12 pb-3 px-4 flex items-center justify-between bg-theme-bg/90 backdrop-blur-md sticky top-0 z-40 border-b border-theme-border/50">
        <button class="flex items-center text-theme-primary font-medium active:opacity-50 transition-opacity" onclick="goHomeWithConfirm()">
            <span class="material-symbols-outlined text-[24px] -ml-2">chevron_left</span>戻る
        </button>
        <div class="font-bold text-[17px] text-theme-text" id="edit-mode-label"></div>
        <button class="text-theme-primary font-semibold active:opacity-50 transition-opacity" onclick="saveAndGoHome()" id="btn-save">
            完了
        </button>
        <button class="text-theme-primary font-semibold active:opacity-50 transition-opacity flex items-center gap-1" onclick="copySharedRule()" id="btn-copy-shared" style="display:none;">
            <span class="material-symbols-outlined text-[20px]">content_copy</span>コピー
        </button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-32 w-full">
        <div class="px-4 pt-6 pb-2 w-full">
            <input type="text" id="edit-name" placeholder="ルール名を入力" class="w-full text-2xl font-bold bg-transparent border-none outline-none placeholder-theme-textMuted mb-5" oninput="onNameChange(this.value)">
            
            <div id="base-rule-section" class="bg-theme-surface rounded-xl p-4 flex items-center justify-between shadow-sm border border-theme-border/30 hidden">
                <span class="font-medium text-sm whitespace-nowrap mr-4 shrink-0">標準ルール</span>
                
                <div class="relative flex-1 flex justify-end items-center min-w-0">
                    <span id="standard-rule-display" class="text-theme-textMuted text-sm font-medium pr-6 text-right truncate w-full pointer-events-none block"></span>
                    <span class="material-symbols-outlined absolute right-0 text-theme-textMuted text-[18px] pointer-events-none">unfold_more</span>
                    <select id="base-rule-select" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="onBaseRuleChange(this.value)"></select>
                </div>
            </div>
            
            <div class="mt-3 flex items-start gap-1.5 text-[11px] text-theme-textMuted px-1">
                <span class="material-symbols-outlined text-[14px] text-theme-primary">info</span>
                <p>標準ルールから変更した項目は、<span class="text-theme-primary font-semibold">青色でハイライト</span>されます。</p>
            </div>
        </div>

        <div id="edit-fields" class="px-4 flex flex-col gap-6 mt-2 w-full"></div>
    </main>

    <div class="fixed bottom-0 w-full max-w-[40rem] bg-theme-bg/95 backdrop-blur-md border-t border-theme-border/50 p-4 pb-8 z-40 flex gap-3">
        <button class="flex-1 bg-theme-surface text-theme-text border border-theme-border py-3 rounded-xl font-semibold shadow-sm active:bg-gray-50 flex justify-center items-center gap-1 transition-all" onclick="saveAndGoHome()" id="btn-save-bottom">
            <span class="material-symbols-outlined text-[20px]">save</span> 保存
        </button>
        <button class="flex-1 bg-theme-primary text-white py-3 rounded-xl font-semibold shadow-sm active:scale-95 flex justify-center items-center gap-1 transition-all" onclick="openActionSheet()" id="btn-share-options">
            <span class="material-symbols-outlined text-[20px]">ios_share</span> 共有・出力
        </button>
    </div>

    <!-- Action Sheet Overlay -->
    <div id="action-sheet-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden transition-opacity duration-300 opacity-0" onclick="closeActionSheet()"></div>
    
    <!-- Action Sheet -->
    <div id="action-sheet" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[40rem] z-[70] transition-transform duration-300 translate-y-full px-3 pb-8 pt-2">
        <div class="bg-white/95 backdrop-blur-xl rounded-2xl overflow-hidden mb-2">
            <button class="w-full py-4 text-theme-primary text-[17px] border-b border-theme-border/50 active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => shareRule(editingId), 300)">
                <span class="material-symbols-outlined text-[20px]">link</span>共有URLを発行
            </button>
            <button class="w-full py-4 text-theme-primary text-[17px] border-b border-theme-border/50 active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => exportPDF(), 300)">
                <span class="material-symbols-outlined text-[20px]">picture_as_pdf</span>PDFとして出力
            </button>
            <button class="w-full py-4 text-theme-primary text-[17px] active:bg-gray-200 flex items-center justify-center gap-2" onclick="closeActionSheet(); setTimeout(() => exportImage(), 300)">
                <span class="material-symbols-outlined text-[20px]">image</span>画像として保存
            </button>
        </div>
        <div class="bg-white rounded-2xl overflow-hidden">
            <button class="w-full py-4 text-theme-danger text-[17px] font-semibold active:bg-gray-200" onclick="closeActionSheet()">
                キャンセル
            </button>
        </div>
    </div>
  </div>
  <!-- 標準ルールの管理画面 -->
  <div class="screen bg-theme-bg" id="screen-custom-base-manager" style="padding-bottom: 5rem;">
    <div class="sticky top-0 z-50 bg-theme-surface border-b border-theme-border flex items-center justify-between px-4 py-3 shadow-sm">

    </div>

      <div class="flex gap-2 mb-6">

          <span class="material-symbols-outlined text-[24px]">add_circle</span>四麻 新規作成
        </button>
        <button class="flex-1 bg-theme-surface border-2 border-teal-500/10 text-teal-600 rounded-xl py-3 font-bold flex flex-col items-center justify-center gap-1 shadow-sm active:bg-teal-500/5 transition-colors" onclick="createNewCustomBase('三麻')">
          <span class="material-symbols-outlined text-[24px]">add_circle</span>三麻 新規作成
        </button>
      </div>
      <div id="custom-base-list" class="w-full"></div>
    </div>
  </div>

  <!-- 標準ルールの編集画面 -->
  <div class="screen bg-theme-bg" id="screen-custom-base-editor" style="padding-bottom: 5rem;">
    <div class="sticky top-0 z-50 bg-theme-surface border-b border-theme-border flex items-center justify-between px-4 py-3 shadow-sm">
      <button class="text-theme-primary flex items-center gap-1 font-bold text-[15px] active:opacity-70 transition-opacity" onclick="showScreen('custom-base-manager')">
        <span class="material-symbols-outlined text-[20px]">arrow_back_ios_new</span>戻る
      </button>
      <span class="font-bold text-theme-text text-[15px]" id="custom-base-title">標準ルール編集</span>
      <button class="bg-theme-primary text-white px-4 py-1.5 rounded-full font-bold text-[13px] active:bg-blue-600 shadow-sm" onclick="saveCustomBaseRule()">保存</button>
    </div>
    <div class="px-4 py-4 max-w-md mx-auto">
      <div class="bg-theme-surface border border-theme-border/30 rounded-xl p-4 shadow-sm mb-6">
        <label class="block text-[11px] font-bold text-theme-textMuted mb-2">ルール名</label>
        <input type="text" id="custom-base-name" class="w-full bg-theme-bg border border-theme-border/50 rounded-lg px-3 py-2 text-[15px] font-bold text-theme-text outline-none focus:border-theme-primary/50 transition-colors" placeholder="例：うちのローカルルール">
      </div>
      <div class="bg-theme-surface border border-theme-border/30 rounded-xl p-4 shadow-sm mb-6">
        <label class="block text-[11px] font-bold text-theme-textMuted mb-2">コピー元 (未選択でデフォルト)</label>
        <div class="relative w-full">
          <select id="custom-base-source" onchange="copyBaseToCustom()" class="w-full bg-theme-bg border border-theme-border/50 rounded-lg px-3 py-2.5 text-[14px] text-theme-text outline-none appearance-none pr-8 truncate focus:border-theme-primary/50">
          </select>
          <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-theme-textMuted pointer-events-none">expand_content</span>
        </div>
      </div>
      <div id="custom-base-editor-items" class="flex flex-col gap-6"></div>
    </div>
  </div>


<!-- 削除確認 -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal-box">
    <p>このルールを削除しますか？</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-red" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<!-- スナックバー -->
<div class="snackbar" id="snackbar"></div>

    for (const [, keys] of cats) {
      for (const k of keys) {
        if (!(k in rule.settings)) {
          rule.settings[k] = def[k] ?? '';
          migrated = true;
        }
      }
    }
  }
  if (migrated) saveData();
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

function getBaseRuleName(k) { return k?.startsWith('__custom__') && customBaseRules[k.replace('__custom__','')] ? customBaseRules[k.replace('__custom__','')].name : (k || ''); }

function getCategories(mode) { return mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3; }
function getBaseRules(mode) {
  const base = mode === '四麻' ? {...BASE_RULES_4} : {...BASE_RULES_3};
  for (const [id, rule] of Object.entries(customBaseRules)) {
    if (rule.mode === mode) {
      base['__custom__' + id] = rule.settings;
    }
  }
  return base;
}

// =====================================================================
// 共有機能 (エクスポート＆インポート)
// =====================================================================
function shareRule(id) {
  const rule = getRule(id);
  if (!rule) return;
  
  // 不要な肥大化データの除外 (例: custom_tiles が空なら除外)
  const exportData = {
    m: rule.mode,
    n: rule.name,
    b: rule.base_rule,
    s: rule.settings
  };
  
  try {
    const jsonStr = JSON.stringify(exportData);
    // LZStringによって安全なURL用文字列に圧縮＆エンコード
    const compressedStr = LZString.compressToEncodedURIComponent(jsonStr);
    
    const url = new URL(window.location.href);
    url.searchParams.set('share', compressedStr);
    
    navigator.clipboard.writeText(url.href).then(() => {
      showSnack('🔗 共有リンクをコピーしました');
    }).catch(() => {
      alert('リンクのコピーに失敗しました。以下のURLをコピーしてください：\n\n' + url.href);
    });
  } catch (e) {
    showSnack('共有リンクの生成に失敗しました');
  }
}

function checkSharedRule() {
  const urlParams = new URLSearchParams(window.location.search);
  const shareData = urlParams.get('share');
  if (shareData) {
    try {
      // ① 最新の LZString でデコード＆展開を試行
      let jsonStr = null;
      try {
        jsonStr = LZString.decompressFromEncodedURIComponent(shareData);
      } catch (err) { /* 無視して次へ */ }

      // ② レガシー仕様（v4.8以下）の Base64URL 形式だった場合のフォールバック
      if (!jsonStr) {
        let sanitizedBase64 = shareData.replace(/-/g, '+').replace(/_/g, '/').replace(/ /g, '+');
        while (sanitizedBase64.length % 4) sanitizedBase64 += '=';
        jsonStr = decodeURIComponent(atob(sanitizedBase64));
      }

      if (!jsonStr) throw new Error("Decompression produced empty string");
      const parsed = JSON.parse(jsonStr);
      
      const id = 'shared_' + Date.now();
      const sharedRule = {
        id: id,
        mode: parsed.m || '四麻',
        name: parsed.n || '共有ルール',
        base_rule: parsed.b || '',
        settings: parsed.s || {},
        readonly: true
      };
      
      // 既存のリストには入れず一時データとして扱う
      appData.rules.push(sharedRule); 
      isSharedMode = true;
      editingId = id;
      
      // URLからパラメータを消去
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
      
      renderEdit();
      showScreen('edit');
      return true;
    } catch (e) {
      console.error(e);
      alert('共有ルールの読み込みに失敗しました。\n原因: ' + (e.message || 'データ破損等'));
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
    }
  }
  return false;
}

function createRule(mode) {
  _editSnapshot = JSON.stringify(appData);
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  const def = getDefault(mode);
  const defBaseKey = mode === '四麻' ? (localStorage.getItem('mahjong_default_base_4ma') || '__custom__preset_jantama_4')
                                     : (localStorage.getItem('mahjong_default_base_3ma') || '__custom__preset_zoo_3');
  const rule = {
    id, mode,
    name: '新規ルール',
    base_rule: defBaseKey,
    settings: JSON.parse(JSON.stringify(def))
  };
  appData.rules.push(rule);
  saveData();

  editingId = id;
  goEdit();
}

// --- スワイプ削除 ---
let _swipeStartX = 0, _swipeCurrentX = 0, _activeSwipe = null;
const SWIPE_WIDTH = -120; 

function handleTouchStart(e) {
    _swipeStartX = e.touches[0].clientX;
    _activeSwipe = e.currentTarget;
    document.querySelectorAll('.swipe-content').forEach(el => {
        if (el !== _activeSwipe) el.style.transform = 'translateX(0)';
    });
}

function handleTouchMove(e) {
    if (!_activeSwipe) return;
    _swipeCurrentX = e.touches[0].clientX;
    const diffX = _swipeCurrentX - _swipeStartX;
    if (diffX < 0 && diffX > SWIPE_WIDTH - 20) {
        _activeSwipe.style.transform = `translateX(${diffX}px)`;
    }
}

function handleTouchEnd(e) {
    if (!_activeSwipe) return;
    const diffX = _swipeCurrentX - _swipeStartX;
    if (diffX < SWIPE_WIDTH / 2) {
        _activeSwipe.style.transform = `translateX(${SWIPE_WIDTH}px)`;
    } else {
        _activeSwipe.style.transform = 'translateX(0)';
    }
    _activeSwipe = null;
}

  if (!rule) { showSnack('ルールが選択されていません'); return; }

  showSnack('画像を生成しています...');

  const ruleName = rule.name || '麻雀ルール';
  const baseRules = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  const standardObj = baseRules[rule.base_rule] || null;

  // 1. 画像用のクリーンなHTML要素をメモリ上で生成

  container.style.fontFamily = 'sans-serif';
  container.style.color = '#333';
  container.style.backgroundColor = '#FFFFFF';
  // スマホなどでも綺麗に描画できるよう、固定幅を持たせる
  container.style.width = '800px';
  container.style.padding = '40px';
  container.style.boxSizing = 'border-box';

  let html = `
      <div style="margin-top: 10px; margin-bottom: 30px;">

  // カテゴリデータの生成
  const appCats = getCategories(rule.mode);
  
  appCats.forEach(cat => {
      const catName = cat[0];
      const keys = cat[1];
      const customizable = cat[2] || false;
      const catKey = catName.replace(/^\d+\.\s*/, '');
      
      let catHtml = `<div style="margin-bottom: 32px;">`;
      let rowIndex = 0;
      
      if (catName.includes('特殊牌')) {
          const tiles = rule.settings.custom_tiles || [];
          if (tiles.length > 0) {
              catHtml += `<h2 style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; background-color: #e5e5ea; padding: 10px 16px; border-radius: 6px; color: #1c1c1e;">${esc(catName)}</h2>`;
              catHtml += `<table style="width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 18px;">`;
              for (const t of tiles) {
                  if (t.name || t.effect) {
                      const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';
                      catHtml += `
                          <tr style="background-color: ${bgColor};">
                              <td style="padding: 12px 16px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.5;">🀄 ${esc(t.name||'(未設定)')}</td>

                          </tr>`;
                      rowIndex++;
                  }
              }
              catHtml += `</table>`;
          }
      } else {
          catHtml += `<h2 style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; background-color: #e5e5ea; padding: 10px 16px; border-radius: 6px; color: #1c1c1e;">${esc(catName)}</h2>`;
          catHtml += `<table style="width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 18px;">`;
          
          for (const k of keys) {
              if (k.endsWith('_custom')) continue;
              if (k === 'yakuman_custom_memo' || k === 'chombo_memo') continue;

              const val = rule.settings[k] ?? '';
              let displayValue = val;
              
              if (val === 'カスタム') {
                  const customVal = rule.settings[k + '_custom'] || '';
                  displayValue = customVal || '未入力';
              }

              const stdVal = standardObj ? String(standardObj[k] || "") : "";
              const isChanged = standardObj && (!(k in standardObj) || String(val) !== stdVal);
              const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
              const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';

              catHtml += `
                  <tr style="background-color: ${bgColor};">
                      <td style="padding: 12px 16px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.5;">${esc(LABELS[k]||k)}</td>

              `;
              rowIndex++;
          }
          
          if (customizable) {
              const customItems = rule.settings['custom_' + catKey] || [];
              for (const item of customItems) {
                  if (item.name || item.value) {
                      const itemName = item.name || '(未設定)';
                      const bItems = (standardObj && standardObj['custom_' + catKey]) || [];
                      const bItem = bItems.find(x => x.name === itemName);
                      const isChanged = standardObj && (!bItem || String(item.value) !== String(bItem.value || ""));
                      const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
                      const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';

                  }
              }
          }

          const userItems = rule.settings['user_items_' + catKey] || [];

              if (item.name || item.value) {
                  const itemName = item.name || '(未設定)';
                  const bItems = (standardObj && standardObj['user_items_' + catKey]) || [];
                  const bItem = bItems.find(x => x.name === itemName);
                  const isChanged = standardObj && (!bItem || String(item.value) !== String(bItem.value || ""));
                  const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
                  const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';

                          <td style="padding: 12px 16px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.5;">${esc(itemName)}</td>

                      </tr>`;
                  rowIndex++;
              }
          }
          catHtml += `</table>`;
      }
      
      html += catHtml;

      const catMemo = rule.settings['memo_' + catKey] || '';
      let combinedMemo = catMemo;
      
      if (catName.includes('役満') && rule.settings.yakuman_type === 'カスタム' && rule.settings.yakuman_custom_memo) {
          combinedMemo = (combinedMemo ? combinedMemo + '\n' : '') + rule.settings.yakuman_custom_memo;

      }

                  <strong style="color: #666; font-size: 14px;">特記事項:</strong><br>
                  ${esc(combinedMemo).replace(/\n/g, '<br>')}
              </div>
          `;
      }
      
      html += `</div>`;
  });

  container.innerHTML = html;

  const hiddenWrapper = document.createElement('div');

  setTimeout(async () => {
    try {

      const fileName = ruleName + '_ルール表.png';
      
      if (navigator.share && navigator.canShare) {
        canvas.toBlob(async (blob) => {
          const file = new File([blob], fileName, { type: 'image/png' });
          if (navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ files: [file], title: fileName });
              showSnack('📷 画像を共有・保存しました');
            } catch(e) { /* ユーザーキャンセル */ }
          } else {
            downloadCanvas(canvas, fileName);
          }
          document.body.removeChild(hiddenWrapper);
        }, 'image/png');
      } else {
        downloadCanvas(canvas, fileName);
        document.body.removeChild(hiddenWrapper);
      }
    } catch(e) { 
      document.body.removeChild(hiddenWrapper);
      showSnack('画像の生成に失敗しました'); 
    }
  }, 300);
}

function downloadCanvas(canvas, fileName) {
  const link = document.createElement('a');
  link.download = fileName;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showSnack('📷 画像を保存しました');
}

async function exportPDF() {
  if (typeof closeActionSheet === 'function') closeActionSheet();
  
  const rule = getRule(editingId);
  if (!rule) { showSnack('ルールが選択されていません'); return; }

  const ruleName = rule.name || '麻雀ルール';
  const baseRules = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  const standardObj = baseRules[rule.base_rule] || null;
  const standardRule = standardObj ? rule.base_rule : (rule.mode === '四麻' ? '四人麻雀ルール' : '三人麻雀ルール');

  // 1. PDF用のクリーンなHTML要素を裏側（メモリ上）で生成する
  const pdfContainer = document.createElement('div');
  pdfContainer.style.fontFamily = 'sans-serif';
  pdfContainer.style.color = '#333';
  pdfContainer.style.backgroundColor = '#FFFFFF';

  let html = `
      <div style="margin-top: 30px; margin-bottom: 30px;">
          <h1 style="font-size: 26px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 10px; margin: 0; text-align: center;">${esc(ruleName)}</h1>
      </div>
  `;

  // カテゴリデータの生成
  const appCats = getCategories(rule.mode);
  
  appCats.forEach(cat => {
      const catName = cat[0];
      const keys = cat[1];
      const customizable = cat[2] || false;
      const catKey = catName.replace(/^\d+\.\s*/, '');
      
      let catHtml = `<div style="page-break-inside: avoid; margin-bottom: 28px;">`;
      let rowIndex = 0;
      
      // 特殊牌カテゴリは例外処理
      if (catName.includes('特殊牌')) {
          const tiles = rule.settings.custom_tiles || [];
          if (tiles.length > 0) {
              catHtml += `<h2 style="font-size: 16px; font-weight: bold; margin: 0 0 6px 0; background-color: #e5e5ea; padding: 8px 12px; border-radius: 4px; color: #1c1c1e;">${esc(catName)}</h2>`;
              catHtml += `<table style="width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 15px;">`;
              for (const t of tiles) {
                  if (t.name || t.effect) {
                      const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';
                      catHtml += `
                          <tr style="background-color: ${bgColor};">
                              <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.4;">🀄 ${esc(t.name||'(未設定)')}</td>
                              <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 60%; text-align: left; color: #007AFF; font-weight: bold; line-height: 1.4;">${esc(t.effect||'')}</td>
                          </tr>`;
                      rowIndex++;
                  }
              }
              catHtml += `</table>`;
          }
      } else {
          catHtml += `<h2 style="font-size: 16px; font-weight: bold; margin: 0 0 6px 0; background-color: #e5e5ea; padding: 8px 12px; border-radius: 4px; color: #1c1c1e;">${esc(catName)}</h2>`;
          catHtml += `<table style="width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 15px;">`;
          
          for (const k of keys) {
              if (k.endsWith('_custom')) continue;
              if (k === 'yakuman_custom_memo' || k === 'chombo_memo') continue;

              const val = rule.settings[k] ?? '';
              let displayValue = val;
              
              if (val === 'カスタム') {
                  const customVal = rule.settings[k + '_custom'] || '';
                  displayValue = customVal || '未入力';
              }

              const stdVal = standardObj ? String(standardObj[k] || "") : "";
              const isChanged = standardObj && (!(k in standardObj) || String(val) !== stdVal);
              const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
              const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';

              catHtml += `
                  <tr style="background-color: ${bgColor};">
                      <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.4;">${esc(LABELS[k]||k)}</td>
                      <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 60%; text-align: left; ${valStyle} line-height: 1.4;">${esc(displayValue)}</td>
                  </tr>
              `;
              rowIndex++;
          }
          
          if (customizable) {
              const customItems = rule.settings['custom_' + catKey] || [];
              for (const item of customItems) {
                  if (item.name || item.value) {
                      const itemName = item.name || '(未設定)';
                      const bItems = (standardObj && standardObj['custom_' + catKey]) || [];
                      const bItem = bItems.find(x => x.name === itemName);
                      const isChanged = standardObj && (!bItem || String(item.value) !== String(bItem.value || ""));
                      const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
                      const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';
                      
                      catHtml += `
                          <tr style="background-color: ${bgColor};">
                              <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.4;">${esc(itemName)}</td>
                              <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 60%; text-align: left; ${valStyle} line-height: 1.4;">${esc(item.value||'')}</td>
                          </tr>`;
                      rowIndex++;
                  }
              }
          }

          const userItems = rule.settings['user_items_' + catKey] || [];
          for (const item of userItems) {
              if (item.name || item.value) {
                  const itemName = item.name || '(未設定)';
                  const bItems = (standardObj && standardObj['user_items_' + catKey]) || [];
                  const bItem = bItems.find(x => x.name === itemName);
                  const isChanged = standardObj && (!bItem || String(item.value) !== String(bItem.value || ""));
                  const valStyle = isChanged ? 'color: #007AFF; font-weight: bold;' : 'color: #111; font-weight: 500;';
                  const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#f9f9fa';
                  
                  catHtml += `
                      <tr style="background-color: ${bgColor};">
                          <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 40%; color: #555; line-height: 1.4;">${esc(itemName)}</td>
                          <td style="padding: 10px 12px; border-top: 1px solid #eaeaea; width: 60%; text-align: left; ${valStyle} line-height: 1.4;">${esc(item.value||'')}</td>
                      </tr>`;
                  rowIndex++;
              }
          }
          catHtml += `</table>`;
      }
      
      html += catHtml;

      const catMemo = rule.settings['memo_' + catKey] || '';
      let combinedMemo = catMemo;
      
      if (catName.includes('役満') && rule.settings.yakuman_type === 'カスタム' && rule.settings.yakuman_custom_memo) {
          combinedMemo = (combinedMemo ? combinedMemo + '\n' : '') + rule.settings.yakuman_custom_memo;
      }
      if (catName.includes('チョンボ') && rule.settings.chombo_batsu === 'カスタム' && rule.settings.chombo_memo) {
          combinedMemo = (combinedMemo ? combinedMemo + '\n' : '') + rule.settings.chombo_memo;
      }

      if (combinedMemo && combinedMemo.trim() !== '') {
          html += `
              <div style="background-color: #f2f2f7; padding: 12px 14px; border-left: 4px solid #c6c6c8; font-size: 14px; margin-bottom: 8px; line-height: 1.6; border-radius: 0 4px 4px 0;">
                  <strong style="color: #666; font-size: 12px;">特記事項:</strong><br>
                  ${esc(combinedMemo).replace(/\n/g, '<br>')}
              </div>
          `;
      }
      
      html += `</div>`;
  });

  pdfContainer.innerHTML = html;

  const hiddenWrapper = document.createElement('div');
  hiddenWrapper.style.position = 'absolute';
  hiddenWrapper.style.left = '-9999px';
  hiddenWrapper.appendChild(pdfContainer);
  document.body.appendChild(hiddenWrapper);

  const opt = {
      margin:       15,
      filename:     `${ruleName}_ルール表.pdf`,
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, useCORS: true },
      jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak:    { mode: ['css', 'legacy'] }
  };

  showSnack('PDFを生成しています...');

  // 3. アニメーション完了とDOM反映を待つため、少し待機してPDF生成を実行
  setTimeout(() => {
      const pdfObj = html2pdf().set(opt).from(pdfContainer);
      
      if (navigator.share && navigator.canShare) {
          pdfObj.output('blob').then(async (blob) => {
              const file = new File([blob], opt.filename, { type: 'application/pdf' });
              if (navigator.canShare({ files: [file] })) {
                  try {
                      await navigator.share({ files: [file], title: opt.filename });
                      showSnack('📄 PDFを共有・保存しました');
                  } catch(e) { /* ユーザーキャンセル */ }
                  document.body.removeChild(hiddenWrapper);
              } else {
                  // Fallback to auto-download if share is not perfectly supported for PDF files
                  pdfObj.save().then(() => {
                      document.body.removeChild(hiddenWrapper);
                      showSnack('📄 PDFを保存しました');
                  });
              }
          }).catch(e => {
              document.body.removeChild(hiddenWrapper);
              showSnack('PDFの生成に失敗しました');
          });
      } else {
          // Fallback to auto-download for devices without Web Share API
          pdfObj.save().then(() => {
              document.body.removeChild(hiddenWrapper);
              showSnack('📄 PDFを保存しました');
          }).catch(e => {
              document.body.removeChild(hiddenWrapper);
              showSnack('PDFの保存に失敗しました');
          });
      }
  }, 300);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

let customBaseRules = {}; // { id: { name, mode, settings } }
let currentCustomBaseId = null;

function loadCustomBaseRules() {
  let isNew = false;
  try {
    const data = localStorage.getItem('mahjong_custom_base_rules');
    if (data) customBaseRules = JSON.parse(data);
    else isNew = true;
  } catch(e) { isNew = true; }

  // 空もしくは初期ロード時
  if (isNew || Object.keys(customBaseRules).length === 0) {
    customBaseRules = {
      "preset_jantama_4": { "name": "雀魂（段位戦）", "mode": "四麻", "settings": {...BASE_RULES_4["雀魂（四麻・段位戦）"]} },
      "preset_tenhou_4": { "name": "天鳳（段位戦）", "mode": "四麻", "settings": {...BASE_RULES_4["天鳳（四麻）"]} },
      "preset_mleague_4": { "name": "Mリーグ", "mode": "四麻", "settings": {...BASE_RULES_4["Mリーグ公式（四麻）"]} },
      "preset_zoo_3": { "name": "三人麻雀（標準）", "mode": "三麻", "settings": {...BASE_RULES_3["三人麻雀（標準）"]} }
    };
    saveCustomBaseRules();
  }
}
loadCustomBaseRules(); // 初期化時に読み込み

// デフォルトベース設定関数
function setDefaultBaseRule(mode, id) {
  if (mode === '四麻') localStorage.setItem('mahjong_default_base_4ma', '__custom__' + id);
  else localStorage.setItem('mahjong_default_base_3ma', '__custom__' + id);
  renderCustomBaseManager(); // 再描画
}

function saveCustomBaseRules() {
  localStorage.setItem('mahjong_custom_base_rules', JSON.stringify(customBaseRules));
}

function createNewCustomBase(mode) {
  currentCustomBaseId = 'custom_' + Date.now();
  customBaseRules[currentCustomBaseId] = {
    name: "新規カスタムルール",
    mode: mode,
    settings: {...(mode === '四麻' ? DEFAULT_4 : DEFAULT_3)}
  };
  openCustomBaseEditor(currentCustomBaseId);
}

function openCustomBaseEditor(id) {
  currentCustomBaseId = id;
  const rule = customBaseRules[id];
  document.getElementById('custom-base-title').textContent = `${rule.mode}基準ルールの編集`;
  document.getElementById('custom-base-name').value = rule.name;
  
  // コピー元セレクトボックス
  const srcSelect = document.getElementById('custom-base-source');
  const bases = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  srcSelect.innerHTML = '<option value="">-- ベースにする基準ルールを選択 --</option>';
  for (const b in bases) {
    srcSelect.insertAdjacentHTML('beforeend', `<option value="${b}">${b}</option>`);
  }
  srcSelect.value = '';

  renderCustomBaseEditorItems();
  showScreen('custom-base-editor');
}

function renderCustomBaseEditorItems() {
  const rule = customBaseRules[currentCustomBaseId];
  const listEl = document.getElementById('custom-base-editor-items');
  listEl.innerHTML = '';
  const cats = rule.mode === '四麻' ? CATEGORIES_4 : CATEGORIES_3;
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;

  cats.forEach(cat => {
    let catTitle = cat[0];
    let catKeys = cat[1];
    let ht = `<div><h2 class="text-[14px] font-bold text-theme-textMuted mb-3 px-1">${esc(catTitle)}</h2><div class="flex flex-col gap-3">`;
    catKeys.forEach(k => {
      let val = rule.settings[k] ?? '';
      let isText = Array.isArray(opts[k]) && opts[k][0] === "";
      let label = LABELS[k] || k;
      
      if (isText) {
        let pVal = rule.settings[k.replace('_custom', '')] ?? '';
        let isVis = (pVal === 'カスタム');
        ht += `<div class="bg-theme-surface border border-theme-border/30 rounded-xl p-4 shadow-sm" id="cbe-row-${k}" style="display:${isVis?'block':'none'}">
                 <label class="flex items-center gap-1.5 text-[12px] font-bold text-theme-textMuted mb-2"><span class="material-symbols-outlined text-[16px]">draw</span>↳ ${esc(label)}</label>
                 <input type="text" class="w-full bg-theme-bg border border-theme-border/50 rounded-lg px-3 py-2 text-[14px] text-theme-text outline-none focus:border-theme-primary/50" value="${esc(val)}" onchange="updateCustomBaseVal('${k}', this.value)">
               </div>`;
      } else {
        ht += `<div class="bg-theme-surface border border-theme-border/30 rounded-xl p-4 shadow-sm">
                 <label class="flex items-center gap-1.5 text-[12px] font-bold text-theme-textMuted mb-2"><span class="material-symbols-outlined text-[16px]">settings</span>${esc(label)}</label>
                 <div class="relative w-full">
                   <select id="cbe-sel-${k}" onchange="updateCustomBaseVal('${k}', this.value); updateCustomBaseSub('${k}')" class="w-full bg-theme-bg border border-theme-border/50 rounded-lg px-3 py-2.5 text-[14px] text-theme-text outline-none appearance-none pr-8 focus:border-theme-primary/50">`;
        opts[k].forEach(o => {
          let sel = (o === val) ? 'selected' : '';
          ht += `<option value="${esc(o)}" ${sel}>${esc(o)}</option>`;
        });
        ht += `  </select><span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-theme-textMuted pointer-events-none">expand_content</span>
                 </div>
               </div>`;
      }
    });
    ht += `</div></div>`;
    listEl.insertAdjacentHTML('beforeend', ht);
  });
}

function updateCustomBaseVal(key, val) {
  if (currentCustomBaseId && customBaseRules[currentCustomBaseId]) {
    customBaseRules[currentCustomBaseId].settings[key] = val;
  }
}

function updateCustomBaseSub(key) {
  if (!currentCustomBaseId) return;
  const rule = customBaseRules[currentCustomBaseId];
  const opts = rule.mode === '四麻' ? OPTIONS_4 : OPTIONS_3;
  const customKey = key + '_custom';
  if (opts[customKey]) {
    const row = document.getElementById(`cbe-row-${customKey}`);
    const isCustom = (document.getElementById(`cbe-sel-${key}`).value === 'カスタム');
    if (row) row.style.display = isCustom ? 'flex' : 'none';
  }
}

function copyBaseToCustom() {
  const src = document.getElementById('custom-base-source').value;
  if (!src) return;
  const rule = customBaseRules[currentCustomBaseId];
  const bases = rule.mode === '四麻' ? BASE_RULES_4 : BASE_RULES_3;
  if (bases[src]) {
    rule.settings = {...bases[src]};
    renderCustomBaseEditorItems();
    showToast(`「${src}」をコピーしました`);
  }
}

function saveCustomBaseRule() {
  const name = document.getElementById('custom-base-name').value.trim();
  if (!name) { alert("ルール名を入力してください"); return; }
  customBaseRules[currentCustomBaseId].name = name;
  saveCustomBaseRules();
  showToast("保存しました");
  renderCustomBaseManager();
  showScreen('custom-base-manager');
}

function renderCustomBaseManager() {
  const container = document.getElementById('custom-base-list');
  let html = '';

  const def4 = localStorage.getItem('mahjong_default_base_4ma') || '__custom__preset_jantama_4';
  const def3 = localStorage.getItem('mahjong_default_base_3ma') || '__custom__preset_zoo_3';

  const renderItem = (k, b, mode, isCustom) => {
      const isDef = (mode === '四麻' && def4 === '__custom__' + k) || (mode === '三麻' && def3 === '__custom__' + k);
      return `<div class="relative overflow-hidden mb-3 rounded-xl bg-theme-surface border border-theme-border/30 shadow-sm" data-actions-width="180" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event)">
        <div class="absolute inset-y-0 right-0 flex w-[180px] swipe-actions z-0">
          ${isCustom ? `<button class="bg-gray-400 text-white w-[60px] font-medium flex flex-col items-center justify-center text-[10px]" onclick="openCustomBaseEditor('${k}')"><span class="material-symbols-outlined text-[20px] mb-0.5">edit</span>編集</button>` : '<div class="w-[60px]"></div>'}
          ${isCustom ? `<button class="bg-theme-danger text-white w-[60px] font-medium flex flex-col items-center justify-center text-[10px]" onclick="deleteCustomBase('${k}')"><span class="material-symbols-outlined text-[20px] mb-0.5">delete</span>削除</button>` : '<div class="w-[60px]"></div>'}
          <button class="${isDef ? 'bg-theme-primary' : 'bg-blue-400'} text-white w-[60px] font-medium flex flex-col items-center justify-center text-[10px]" onclick="setDefaultBaseRule('${mode}', '${k}')">
             <span class="material-symbols-outlined text-[20px] mb-0.5">${isDef ? 'star' : 'star_border'}</span>${isDef ? 'デフォルト' : '標準に設定'}
          </button>
        </div>
        <div class="relative bg-theme-surface flex items-center justify-between px-4 py-4 swipe-content z-10" ${isCustom ? `onclick="openCustomBaseEditor('${k}')"` : `onclick="setDefaultBaseRule('${mode}', '${k}')"`}>
          <div class="flex flex-col gap-1 w-full">
            <div class="flex items-center gap-2">
              <span class="bg-theme-bg px-2 py-0.5 rounded text-[11px] text-theme-textMuted border border-theme-border/50 font-normal">${mode}</span>
              ${isDef ? `<span class="bg-theme-primary/10 text-theme-primary px-1.5 py-0.5 rounded text-[10px] font-bold">★ デフォルト</span>` : ''}
              <span class="font-bold text-[15px] ${isCustom ? 'text-theme-text' : 'text-theme-textMuted'} truncate">${esc(b.name)}</span>
            </div>
            <div class="text-[12px] text-theme-textMuted">左スワイプで${isCustom ? '編集/削除/標準化' : '標準化'}</div>
          </div>
          <span class="material-symbols-outlined text-theme-textMuted text-[20px] pointer-events-none">chevron_right</span>
        </div>
      </div>`;
  };

  const customRuleKeys = Object.keys(customBaseRules);
  let hasCustom = false;
  for (const k of customRuleKeys) {
      if (!customBaseRules[k]) continue;
      if (k.startsWith('preset_')) continue;
      hasCustom = true;
      html += renderItem(k, customBaseRules[k], customBaseRules[k].mode, true);
  }
  
  if (hasCustom) html += '<hr class="my-6 border-theme-border/30 border-dashed">';

  for (const k of customRuleKeys) {
      if (!customBaseRules[k]) continue;
      if (k.startsWith('preset_4')) html += renderItem(k, customBaseRules[k], '四麻', false);
      else if (k.startsWith('preset_3') || (k.startsWith('preset_') && customBaseRules[k].mode)) html += renderItem(k, customBaseRules[k], customBaseRules[k].mode, false);
  }

  container.innerHTML = html;
  initSwipeDelete(); // スワイプ機能を初期化
}

function deleteCustomBase(id) {
  if (confirm("このカスタムルールを削除しますか？")) {
    delete customBaseRules[id];
    saveCustomBaseRules();
    renderCustomBaseManager();
  }
}

      manageStandardRules: "標準ルール",
      tab4p: "四人麻雀",
      tab3p: "三人麻雀",
      create4pRule: "新しいルールを作成する",
      create3pRule: "新しいルールを作成する",
      actionCopy: "コピー",
      actionDelete: "削除",
      versionPrefix: "v",
      emptyRules: "ルールが作成されていません",
    },
    appVersion: "1.0.8", 
    buildDate: "2026-03-17 09:55",
  };

  // ==========================================
  // 2. メインコンポーネント (New Material Design Layout)
  // ==========================================
  function App({ rulesFromVanilla }) {
    const [activeTab, setActiveTab] = useState(4); // 4 = 四人麻雀, 3 = 三人麻雀
    const [showPwaBanner, setShowPwaBanner] = useState(false);
    
    // VanillaJS側で保存されたルールをフィルタリング
    const displayedRules = rulesFromVanilla.filter(rule => (rule.mode === '四麻' ? 4 : 3) === activeTab);

    useEffect(() => {
      window._triggerReactPWABanner = () => setShowPwaBanner(true);
      window._hideReactPWABanner = () => setShowPwaBanner(false);
      if (window.deferredPrompt) setShowPwaBanner(true);
      return () => {
        window._triggerReactPWABanner = null;
        window._hideReactPWABanner = null;
      };
    }, []);

    const handleInstallPWA = () => { if (window.installPWA) window.installPWA(); };

    const handleAction = (action, rule) => {
      switch(action) {
        case 'copy': window.duplicateRule(rule.id); break;
        case 'delete': window.askDelete(rule.id); break;
      }
    };

    return (
      <div className="app-container">
        
        {/* 固定ヘッダー */}
        <header className="pt-12 pb-4 flex justify-between items-end" style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }}>
          <div>
            <h1 className="text-2xl font-bold tracking-tight text-theme-text">
              {CONFIG.strings.appTitle}
            </h1>
          </div>
          <button 
            onClick={() => window.showScreen('custom-base-manager')}
            className="text-theme-primary text-sm font-medium flex items-center gap-1 active:opacity-70 transition-opacity"
          >
            <span className="material-symbols-outlined text-[20px]">settings</span>
            <span>{CONFIG.strings.manageStandardRules}</span>
          </button>
        </header>

        {/* タブ切り替え */}
        <div style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }} className="mb-5">
          <div className="flex bg-theme-segmentedBg p-1 rounded-lg">
            <button 
              onClick={() => setActiveTab(4)}
              className={`flex-1 py-1.5 text-sm transition-all rounded ${activeTab === 4 ? 'font-semibold text-center bg-theme-surface shadow-sm text-theme-text' : 'font-medium text-center text-theme-textMuted active:bg-white/50'}`}
            >
              {CONFIG.strings.tab4p}
            </button>
            <button 
              onClick={() => setActiveTab(3)}
              className={`flex-1 py-1.5 text-sm transition-all rounded ${activeTab === 3 ? 'font-semibold text-center bg-theme-surface shadow-sm text-theme-text' : 'font-medium text-center text-theme-textMuted active:bg-white/50'}`}
            >
              {CONFIG.strings.tab3p}
            </button>
          </div>
        </div>

        {/* PWAインストールバナー */}
        {showPwaBanner && (
          <div style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }} className="mb-4">
            <div onClick={handleInstallPWA} className="bg-theme-surface text-theme-primary text-xs font-bold px-4 py-3 rounded-xl border border-theme-border flex items-center justify-between cursor-pointer active:scale-95 transition-transform shadow-sm">
              <span>📱 ホーム画面に追加してアプリとして使う</span>
              <button className="bg-theme-primary text-white px-3 py-1.5 rounded-md shadow-sm">追加</button>
            </div>
          </div>
        )}

        {/* 新規作成ボタン */}
        <div style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }} className="mb-6">
          <button 
            onClick={() => window.createRule(activeTab === 4 ? '四麻' : '三麻')}
            className="w-full bg-theme-primary text-white rounded-xl py-3.5 flex items-center justify-center gap-2 font-semibold shadow-sm active:scale-95 transition-transform"
          >
            <span className="material-symbols-outlined text-[22px]">add_circle</span>
            {activeTab === 4 ? CONFIG.strings.create4pRule : CONFIG.strings.create3pRule}
          </button>
        </div>

        {/* スクロール可能なメインコンテンツ（ルール一覧） */}
        <main className="flex-1 overflow-y-auto pb-8 no-scrollbar" style={{ paddingLeft: 'var(--app-padding)', paddingRight: 'var(--app-padding)' }}>
          <div className="flex flex-col gap-3">
            {displayedRules.map((rule) => {
              const isReadOnly = rule.readonly;
              return (
                <div 
                  key={rule.id} 
                  className={isReadOnly ? "bg-theme-readonlyBg p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border opacity-90" : "bg-theme-surface p-4 rounded-2xl flex items-center justify-between shadow-sm border border-theme-border/50"}
                >
                  <div 
                    onClick={() => window.editRule(rule.id)}
                    className="flex-1 min-w-0 pr-4 flex flex-col cursor-pointer active:opacity-60 transition-opacity"
                  >
                    {!isReadOnly ? (
                      <>
                        <h2 className="text-base font-semibold text-theme-text truncate">{rule.name}</h2>
                        <div className="flex items-center gap-1 mt-1 text-theme-textMuted">
                          <span className="material-symbols-outlined text-[14px]">calendar_today</span>
                          <p className="text-xs">更新: {rule.date || "2026/03/16"}</p>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex items-center gap-2">
                            <h2 className="text-base font-semibold text-theme-text truncate">{rule.name}</h2>
                            <span className="material-symbols-outlined text-theme-textMuted text-[18px]">lock</span>
                          </div>
                          <div className="flex items-center gap-1 text-theme-textMuted">
                            <span className="material-symbols-outlined text-[14px]">verified</span>
                            <p className="text-xs">共有ルール（改変不可）</p>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                  <div className="flex items-center gap-4 text-theme-textMuted">
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('copy', rule); }}
                      className="flex items-center justify-center hover:text-theme-primary active:scale-90 transition-all font-inherit"
                      aria-label="コピー"
                    >
                      <span className="material-symbols-outlined text-[22px]">content_copy</span>
                    </button>
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleAction('delete', rule); }}
                      className="flex items-center justify-center hover:text-theme-danger active:scale-90 transition-all font-inherit"
                      aria-label="削除"
                    >
                      <span className="material-symbols-outlined text-[22px]">delete</span>
                    </button>
                  </div>
                </div>
              );
            })}

            {displayedRules.length === 0 && (
              <div className="text-center py-10 text-theme-textMuted">
                <p className="text-sm font-medium">{CONFIG.strings.emptyRules}</p>
              </div>
            )}
          </div>
        </main>

        <footer className="py-6 text-center shrink-0">
          <p className="text-[11px] font-medium text-theme-textMuted tracking-wider mb-1">
            VERSION {CONFIG.appVersion}
          </p>
          <p className="text-[10px] text-theme-textMuted/70">
            ビルド時刻: {CONFIG.buildDate}
          </p>
        </footer>

      </div>
    );
  }

  // Vanilla JSからのレンダリングフック
  window._renderReactHome = function() {
    if (!window.reactRoot) {
      window.reactRoot = ReactDOM.createRoot(document.getElementById('react-home-root'));
    }
    // VanillaJSの現在のステートを伝播させて再描画
    window.reactRoot.render(<App rulesFromVanilla={appData.rules} />);
  }
</script>
</body>
</html>
